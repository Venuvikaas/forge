          '<span class="pane-title">Issue summary</span>' +
          '<div class="detail-menu-wrap">' +
            '<button type="button" class="kebab" id="kebab-btn" aria-haspopup="true" ' +
              'aria-expanded="' + (AppState.menuOpen ? "true" : "false") + '" ' +
              'aria-label="Override controls" title="Override controls">⋯</button>' +
            renderOverrideMenu(issue) +
          "</div>" +
        "</div>" +
        '<article class="summary p-' + key + '">' +
          '<div class="meta">' +
            sourceBadge(issue.source) +
            (issue.source_account ? '<span class="acct">' + escapeHtml(issue.source_account) + "</span>" : "") +
            '<span class="id">' + escapeHtml(issue.id) + "</span>" +
            '<span class="badge p-' + key + '">' + escapeHtml(key) + "</span>" +
            statusBadge(issue) +
            '<span class="assignee-chip' + (issue.assignee ? "" : " unassigned") + '">' +
              escapeHtml(issue.assignee ? "@" + issue.assignee : "Unassigned") + "</span>" +
          "</div>" +
          "<h1>" + escapeHtml(issue.title) + "</h1>" +
          renderTriageReason(issue) +
          '<section class="detail-section"><h2>Report</h2>' +
            '<p class="detail-text">' + escapeHtml(issue.body || "") + "</p></section>" +
          '<section class="detail-section"><h2>Reproduction</h2>' + repro + "</section>" +
          '<section class="detail-section"><h2>Related reports</h2>' + renderRelatedList(issue) + "</section>" +
        "</article>"
      );
    }

    // RIGHT pane — the investigation: trigger, live status tree, hypothesis,
    // verified fix, evidence, and the audit timeline.
    function renderRight(issue) {
      const investigation = AppState.investigations[issue.id] || { status: "idle" };
      const investigating = investigation.status === "running";
      return (
        '<div class="pane-head"><span class="pane-title">Investigation &amp; evidence</span></div>' +
        '<div class="detail-actions">' +
          '<button type="button" class="investigate-btn" id="investigate-issue"' +
            (investigating ? " disabled" : "") + ">" +
            (investigating ? "Investigating…" : "Investigate") +
          "</button>" +
        "</div>" +
        renderInvestigationStatus(investigation) +
        renderHypothesisSummary(investigation) +
        renderProposedFix(investigation) +
        renderEvidenceCards(investigation) +
        '<section class="detail-section"><h2>Audit timeline</h2>' + renderTimeline(issue) + "</section>"
      );
    }

    // Render the workspace (center + right) without touching the queue pane, so
    // the left-pane search keeps its focus and caret across re-renders.
    function renderWorkspace(issue) {
      clearMenuDismiss();
      document.getElementById("pane-center").innerHTML = renderCenter(issue);
      document.getElementById("pane-right").innerHTML = renderRight(issue);
      bindWorkspace(issue);
    }

    // Alias kept so override/investigate/timeline flows that re-render still work.
    function renderDetail(issue) { renderWorkspace(issue); }

    function bindWorkspace(issue) {
      const back = document.getElementById("back-to-queue");
      if (back) back.addEventListener("click", goQueue);
      const inv = document.getElementById("investigate-issue");
      if (inv) inv.addEventListener("click", function () { startInvestigation(issue.id); });
      // Three-dot override menu: toggle + the three controls.
      const kebab = document.getElementById("kebab-btn");
      if (kebab) {
        kebab.addEventListener("click", function (e) {
          e.stopPropagation();
          AppState.menuOpen = !AppState.menuOpen;
          renderWorkspace(issue);
        });
      }
      const ovPriority = document.getElementById("ov-priority");
      if (ovPriority) ovPriority.addEventListener("change", function () { overridePriority(issue.id, ovPriority.value); });
      const ovStatus = document.getElementById("ov-status");
      if (ovStatus) ovStatus.addEventListener("change", function () { overrideStatus(issue.id, ovStatus.value); });
      const ovAssignInput = document.getElementById("ov-assignee");
      const ovAssignBtn = document.getElementById("ov-assign-btn");
      if (ovAssignInput && ovAssignBtn) {
        ovAssignBtn.addEventListener("click", function () { overrideAssignee(issue.id, ovAssignInput.value); });
        ovAssignInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); overrideAssignee(issue.id, ovAssignInput.value); }
        });
      }
      if (AppState.menuOpen) {
        const wrap = document.querySelector(".detail-menu-wrap");
        if (wrap) wrap.addEventListener("click", function (e) { e.stopPropagation(); });
        installMenuDismiss(issue);
      }
      const copyBtn = document.getElementById("copy-fix");
      if (copyBtn) {
        copyBtn.addEventListener("click", function () {
          const fix = (AppState.investigations[issue.id] || {}).proposed_fix || {};
          const diff = fix.diff || "";
          if (!diff || !navigator.clipboard) return;
          navigator.clipboard.writeText(diff).then(function () {
            copyBtn.textContent = "Copied ✓";
            copyBtn.classList.add("copied");
            setTimeout(function () {
              copyBtn.textContent = "Copy diff";
              copyBtn.classList.remove("copied");
            }, 1800);
          }).catch(function () { /* clipboard blocked — no-op */ });
        });
      }
      document.querySelectorAll("[data-related-id]").forEach(function (button) {
        button.addEventListener("click", function () {
          selectIssue(button.getAttribute("data-related-id"));
        });
      });
    }

    // Empty-state prompts shown in the workspace until an issue is selected.
    function renderWorkspaceEmpty() {
      const c = document.getElementById("pane-center");
      const r = document.getElementById("pane-right");
      if (c) c.innerHTML =
        '<div class="ws-empty"><div class="glyph">◆</div><h2>Pick a report</h2>' +
        "<p>Select an issue from the queue to see its triage reason, report, reproduction, and related reports here.</p></div>";
      if (r) r.innerHTML =
        '<div class="ws-empty"><div class="glyph">⌖</div><h2>No investigation</h2>' +
        "<p>Investigation status, evidence, the proposed fix, and the audit timeline appear here once you open an issue.</p></div>";
    }

    // Return to the queue (clears selection; on narrow screens shows the queue pane).
    function goQueue() {
      AppState.selectedId = null;
      AppState.menuOpen = false;
      clearMenuDismiss();
      const ck = document.querySelector(".cockpit");
      if (ck) ck.setAttribute("data-view", "queue");
      updateQueueList();
      renderWorkspaceEmpty();
    }

    async function startInvestigation(issueId) {
      const issue = findIssue(issueId);
      if (!issue) return;
      AppState.investigations[issueId] = {
        status: "running",
        phase: "queued",
        started_at: new Date().toISOString(),
      };
      renderDetail(issue);
      try {
        const run = await DataSource.triggerInvestigation(issue);
        // triggerInvestigation only resolves after the live attempt settles (and
        // falls back to the backup take). A hypothesis => show it. No hypothesis =>
        // the workflow failed/was too slow AND no backup exists: surface a clean,
        // retryable "unavailable" state with whatever evidence we did gather — never
        // an infinite spinner, never a crash.
        if (run && run.hypothesis) {
          AppState.investigations[issueId] = Object.assign({}, AppState.investigations[issueId], run, {
            phase: "synthesis",
            status: "complete",
            hypothesis: run.hypothesis,
            evidence: (run && run.evidence) || [],
          });
        } else {
          AppState.investigations[issueId] = {
            status: "error",
            message: "The investigation didn't return a hypothesis — the workflow may be slow or temporarily unavailable. Any evidence gathered is shown below; press Investigate to try again.",
            evidence: (run && run.evidence) || [],
          };
        }
      } catch (err) {
        AppState.investigations[issueId] = {
          status: "error",
          message: (err && err.message) || "Investigation could not start. Press Investigate to try again.",
        };
      }
      renderDetail(issue);
    }

    function selectIssue(id) {
      const issue = findIssue(id);
      if (!issue) return;
      AppState.selectedId = id;
      AppState.menuOpen = false;
      clearMenuDismiss();
      const ck = document.querySelector(".cockpit");
      if (ck) ck.setAttribute("data-view", "detail");
      updateQueueList();      // refresh the active-card highlight in the left pane
      renderWorkspace(issue);
      // Pull the real audit trail (live) in the background; synthesis already
      // rendered above, so this only refines it once the events Table answers.
      loadTimeline(issue);
    }

    function renderLoading() {
      const row =
        '<div class="skeleton"><div class="sk-body">' +
        '<div class="sk-line lg"></div><div class="sk-line sm"></div>' +
        '</div><div class="sk-pill"></div></div>';
      const q = document.getElementById("pane-queue");
      if (q) q.innerHTML =
        '<div class="pane-head"><span class="pane-title">Queue</span></div>' +
        '<div class="queue" aria-busy="true" aria-label="Loading issues">' +
        row.repeat(6) + "</div>";
      renderWorkspaceEmpty();
    }

    function renderEmpty() {
      const q = document.getElementById("pane-queue");
      if (q) q.innerHTML =
        '<div class="state">' +
          '<div class="glyph">◇</div>' +
          "<h2>The forge is cold</h2>" +
          "<p>Nothing to triage right now. New GitHub issues and seeded " +
          "Slack and email reports land here automatically.</p>" +
        "</div>";
      renderWorkspaceEmpty();
    }

    function renderError(message) {
      const q = document.getElementById("pane-queue");
      if (q) q.innerHTML =
        '<div class="state error">' +
          '<div class="glyph">!</div>' +
          "<h2>Couldn’t load the queue</h2>" +
          "<p>" + escapeHtml(message) + "</p>" +
          '<button type="button" onclick="boot()">Retry</button>' +
        "</div>";
    }

    // Furnace gauge — the heat of the whole queue (not the filtered view).
    function renderFurnaceGauge() {
      const gauge = document.getElementById("furnace-gauge");
      if (!gauge) return;
      const crit = AppState.issues.filter(function (i) { return i.priority === "critical"; }).length;
      const total = AppState.issues.length;
      gauge.classList.toggle("hot", crit > 0);
      gauge.innerHTML =
        '<span class="g-crit">' + crit + " critical</span>" +
        '<span class="g-sep">·</span>' +
        '<span class="g-total">' + total + " in queue</span>";
    }

    const SOURCE_PILL_LABELS = { live: "live pod", seed: "seed data", sample: "sample data", mock: "sample data" };
    function renderSourcePill() {
      const pill = document.getElementById("source-pill");
      const label = document.getElementById("source-label");
      pill.classList.remove("live", "mock");
      if (DataSource.mode === "live") {
        pill.classList.add("live");
        label.textContent = "live pod";
      } else {
        pill.classList.add("mock");
        label.textContent = SOURCE_PILL_LABELS[DataSource.mode] || "sample data";
      }
    }

    async function boot() {
      renderLoading();
      try {
        await DataSource.init();
        renderSourcePill();
        const issues = await DataSource.listIssues();
        renderSourcePill();   // mode is finalized in listIssues (seed vs sample)
        AppState.issues = issues || [];
        renderFurnaceGauge();
        if (!issues || issues.length === 0) {
          renderEmpty();
        } else {
          renderQueue(AppState.issues);
        }
      } catch (err) {
        console.error(err);
        renderError((err && err.message) || "Unknown error.");
      }
    }

    // ---- Light / dark theme switch (persisted; pre-painted in <head>) ----
    const THEME_ICON = { dark: "☾", light: "☀" };
    const THEME_LABEL = { dark: "Dark", light: "Light" };
    function applyTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      try { localStorage.setItem("forge-theme", t); } catch (e) { /* storage blocked */ }
      const b = document.getElementById("theme-toggle");
      if (b) {
        const icon = b.querySelector(".tt-icon");
        const label = b.querySelector(".tt-label");
        if (icon) icon.textContent = THEME_ICON[t];
        if (label) label.textContent = THEME_LABEL[t];
        b.setAttribute("aria-pressed", t === "light" ? "true" : "false");
      }
    }
    function initTheme() {
      let t = null;
      try { t = localStorage.getItem("forge-theme"); } catch (e) { /* ignore */ }
      if (t !== "light" && t !== "dark") {
        t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
      }
      applyTheme(t);
      const b = document.getElementById("theme-toggle");
      if (b) b.addEventListener("click", function () {
        const cur = document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
        applyTheme(cur === "light" ? "dark" : "light");
      });
    }

    // Load the SDK from the injected API origin, then boot. If there is no
    // injected config (local/static serving), boot straight into mock mode.
    (function () {
      initTheme();
      const cfg = window.__LEMMA_CONFIG__;
      if (!cfg || !cfg.apiUrl) { boot(); return; }
      const base = cfg.apiUrl.replace(/\/$/, "");
      const s = document.createElement("script");
      s.src = base + "/public/sdk/lemma-client.js";
      s.onload = boot;
      s.onerror = boot;   // SDK unavailable → mock mode, still serves
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
