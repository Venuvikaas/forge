<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forge — Priority Queue</title>
  <style>
    /* ---- Design tokens (one tone: focused engineering-ops console) ---- */
    :root {
      --bg:        #0e1116;
      --surface-1: #151a21;
      --surface-2: #1b2129;
      --border:    #262d38;
      --border-strong: #3a434f;
      --text:      #e6eaf0;
      --text-2:    #aab3c0;
      --text-mute: #6b7787;
      --accent:    #6ea8fe;
      --accent-hover: #8bbcff;
      /* status / priority colors */
      --critical:  #ff6b6b;
      --high:      #ffa94d;
      --normal:    #4dabf7;
      --low:       #868e96;
      --ok:        #51cf66;
      --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
      --space-4: 16px; --space-6: 24px; --space-8: 32px;
      --radius: 10px;
      --mono: ui-monospace, "SF Mono", "Cascadia Mono", "JetBrains Mono", Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    /* ---- App shell ---- */
    .app { max-width: 920px; margin: 0 auto; padding: var(--space-6) var(--space-4) var(--space-8); }
    header.bar {
      display: flex; align-items: center; gap: var(--space-3);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-6);
    }
    .logo {
      font-weight: 700; letter-spacing: -0.01em; font-size: 18px;
      display: flex; align-items: center; gap: var(--space-2);
    }
    .logo .spark { color: var(--accent); }
    .logo .sub { color: var(--text-mute); font-weight: 500; font-size: 13px; }
    .grow { flex: 1; }
    /* connection / data-source pill */
    .pill {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.02em;
      padding: 3px 9px; border-radius: 999px;
      border: 1px solid var(--border-strong); color: var(--text-2);
      display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-mute); }
    .pill.live .dot { background: var(--ok); }
    .pill.mock .dot { background: var(--high); }

    main { min-height: 200px; }
    .placeholder {
      color: var(--text-mute); text-align: center; padding: var(--space-8) 0;
      font-size: 13px;
    }

    /* ---- Queue ---- */
    .queue { display: flex; flex-direction: column; gap: var(--space-3); }
    .card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-4);
      display: flex; align-items: flex-start; gap: var(--space-4);
      transition: border-color .12s ease, background .12s ease;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    .card:hover, .card:focus-visible { border-color: var(--border-strong); background: var(--surface-2); outline: none; }
    .card .body { flex: 1; min-width: 0; }
    .card .title {
      font-size: 15px; font-weight: 600; color: var(--text);
      margin: 0 0 var(--space-2);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .card .meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-2);
      font-family: var(--mono); font-size: 11px; color: var(--text-mute);
    }
    .card .meta .id { color: var(--text-2); }
    .source {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 5px;
      border: 1px solid var(--border-strong); color: var(--text-2);
      white-space: nowrap;
    }
    .source.s-github { color: #c9d1d9; border-color: #57606a; background: rgba(139,148,158,0.12); }
    .source.s-slack  { color: #7ee787; border-color: #3fb950; background: rgba(63,185,80,0.10); }
    .source.s-email  { color: #d2a8ff; border-color: #a371f7; background: rgba(163,113,247,0.10); }
    /* priority badge + color coding */
    .badge {
      flex-shrink: 0;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 999px;
      border: 1px solid var(--border-strong); color: var(--text-2);
      white-space: nowrap;
    }
    /* color per priority — badge tint + matching left rail on the card */
    .badge.p-critical { color: var(--critical); border-color: var(--critical); background: rgba(255,107,107,0.10); }
    .badge.p-high     { color: var(--high);     border-color: var(--high);     background: rgba(255,169,77,0.10); }
    .badge.p-normal   { color: var(--normal);   border-color: var(--normal);   background: rgba(77,171,247,0.10); }
    .badge.p-low      { color: var(--low);      border-color: var(--low);      background: rgba(134,142,150,0.10); }
    .badge.p-untriaged{ color: var(--text-mute); border-style: dashed; }
    .related-badge {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.03em;
      padding: 2px 7px; border-radius: 999px;
      border: 1px solid rgba(110,168,254,0.55);
      color: var(--accent); background: rgba(110,168,254,0.10);
      white-space: nowrap;
    }

    .card { border-left-width: 3px; border-left-color: var(--border); }
    .card.p-critical { border-left-color: var(--critical); }
    .card.p-high     { border-left-color: var(--high); }
    .card.p-normal   { border-left-color: var(--normal); }
    .card.p-low      { border-left-color: var(--low); }
    .card.p-untriaged{ border-left-color: var(--border-strong); }

    /* ---- Detail view ---- */
    .toolbar { margin-bottom: var(--space-4); }
    .back-btn {
      font: inherit; font-size: 13px; color: var(--text-2);
      background: transparent; border: 1px solid var(--border-strong);
      border-radius: 8px; padding: 7px 12px; cursor: pointer;
    }
    .back-btn:hover, .back-btn:focus-visible {
      color: var(--text); border-color: var(--accent); outline: none;
    }
    .detail {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border-strong);
      border-radius: var(--radius);
      padding: var(--space-6);
    }
    .detail.p-critical { border-left-color: var(--critical); }
    .detail.p-high     { border-left-color: var(--high); }
    .detail.p-normal   { border-left-color: var(--normal); }
    .detail.p-low      { border-left-color: var(--low); }
    .detail.p-untriaged{ border-left-color: var(--border-strong); }
    .detail h1 {
      font-size: 22px; line-height: 1.25; margin: 0 0 var(--space-3);
      letter-spacing: 0;
    }
    .detail .meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-2);
      margin-bottom: var(--space-6);
    }
    .detail-section { border-top: 1px solid var(--border); padding-top: var(--space-4); margin-top: var(--space-4); }
    .detail-section h2 {
      margin: 0 0 var(--space-2); font-size: 12px; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-mute);
    }
    .detail-text {
      color: var(--text-2); white-space: pre-wrap; overflow-wrap: anywhere;
      margin: 0; font-size: 14px;
    }
    .detail-empty { color: var(--text-mute); font-size: 13px; margin: 0; }

    footer { margin-top: var(--space-8); color: var(--text-mute); font-size: 12px; text-align: center; }
    footer code { font-family: var(--mono); color: var(--text-2); }

    /* ---- Loading skeletons (not spinners) ---- */
    .skeleton {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-4);
      display: flex; align-items: center; gap: var(--space-4);
    }
    .skeleton .sk-body { flex: 1; }
    .sk-line { height: 12px; border-radius: 6px; background: var(--surface-2);
      position: relative; overflow: hidden; }
    .sk-line.lg { width: 60%; height: 15px; margin-bottom: 10px; }
    .sk-line.sm { width: 30%; }
    .sk-pill { width: 64px; height: 22px; border-radius: 999px; background: var(--surface-2); }
    .sk-line::after, .sk-pill::after {
      content: ""; position: absolute; inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      animation: shimmer 1.2s infinite;
    }
    .sk-pill { position: relative; overflow: hidden; }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    @media (prefers-reduced-motion: reduce) {
      .sk-line::after, .sk-pill::after { animation: none; }
    }

    /* ---- Empty / error states ---- */
    .state { text-align: center; padding: var(--space-8) var(--space-4); color: var(--text-2); }
    .state .glyph { font-size: 30px; line-height: 1; margin-bottom: var(--space-3); }
    .state h2 { font-size: 16px; font-weight: 600; color: var(--text); margin: 0 0 var(--space-2); }
    .state p { margin: 0 auto; max-width: 380px; font-size: 13px; color: var(--text-mute); }
    .state.error .glyph { color: var(--critical); }
    .state code { font-family: var(--mono); color: var(--text-2); font-size: 12px; }
    .state button {
      margin-top: var(--space-4); font: inherit; font-size: 13px;
      color: var(--bg); background: var(--accent); border: 0;
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
    }
    .state button:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <div class="app">
    <header class="bar">
      <span class="logo"><span class="spark">◆</span> Forge <span class="sub">/ Priority Queue</span></span>
      <span class="grow"></span>
      <span id="source-pill" class="pill"><span class="dot"></span><span id="source-label">connecting…</span></span>
    </header>

    <main id="main">
      <div class="placeholder">Loading…</div>
    </main>

    <footer>
      AI bug-triage operator console · built on the <code>Lemma SDK</code>
    </footer>
  </div>

  <script>
    /* ----------------------------------------------------------------
       Lemma SDK boot.
       The pod host injects window.__LEMMA_CONFIG__ (podId, apiUrl, authUrl)
       at serve time and the SDK is loaded from cfg.apiUrl. When the page is
       served standalone for local development (Day 1, mock data), neither is
       present — we degrade to "mock" mode and read seed/issues.json so the
       queue still renders. The data seam lives in DataSource.listIssues().
    ---------------------------------------------------------------- */
    const DataSource = {
      mode: "mock",          // "live" once connected to the pod, else "mock"
      client: null,
      user: null,
      async init() {
        const cfg = window.__LEMMA_CONFIG__;
        if (cfg && window.LemmaClient) {
          try {
            this.client = new window.LemmaClient.LemmaClient();
            const state = await this.client.initialize();   // { status, user }
            if (state && state.status === "authenticated") {
              this.mode = "live";
              this.user = state.user || null;
            }
          } catch (err) {
            console.warn("Lemma init failed, falling back to mock data:", err);
          }
        }
        return this.mode;
      },

      /* The data seam. Day 1 reads the mock fixture; the EOD checkpoint box
         flips this to the live `issues` Table — same row shape (contracts §1). */
      async listIssues() {
        if (this.mode === "live") {
          const res = await this.client.records.list("issues", { limit: 100 });
          const items = (res && res.items) || res || [];
          // Records come back as flat row objects (contract §1 fields at top
          // level). Unwrap defensively in case a row is delivered as {payload}.
          return items.map(function (r) {
            return r && r.payload && r.title === undefined
              ? Object.assign({ id: r.id }, r.payload)
              : r;
          });
        }
        const res = await fetch("../seed/issues.json", { cache: "no-store" });
        if (!res.ok) throw new Error("could not load seed/issues.json (" + res.status + ")");
        return res.json();
      },
    };

    function escapeHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    // Critical-first ordering. Lower rank = higher up the queue; untriaged sinks
    // to the bottom. Ties broken by most-recently-updated.
    const PRIORITY_RANK = { critical: 0, high: 1, normal: 2, low: 3 };
    const AppState = { issues: [], selectedId: null };

    function priorityRank(p) {
      return p && p in PRIORITY_RANK ? PRIORITY_RANK[p] : 99;
    }
    function sortCriticalFirst(issues) {
      return issues.slice().sort(function (a, b) {
        const r = priorityRank(a.priority) - priorityRank(b.priority);
        if (r !== 0) return r;
        return String(b.updated_at || "").localeCompare(String(a.updated_at || ""));
      });
    }

    const SOURCE_LABELS = { github: "GitHub", slack: "Slack", email: "Email" };
    function sourceBadge(source) {
      const key = SOURCE_LABELS[source] ? source : "unknown";
      const label = SOURCE_LABELS[source] || String(source || "Unknown");
      return '<span class="source s-' + escapeHtml(key) + '">' + escapeHtml(label) + "</span>";
    }

    function relatedCount(issue) {
      return Array.isArray(issue.related_ids) ? issue.related_ids.length : 0;
    }

    function relatedBadge(issue) {
      const count = relatedCount(issue);
      if (!count) return "";
      return '<span class="related-badge">' + count + " related</span>";
    }

    function issueCard(issue) {
      const key = issue.priority || "untriaged";
      return (
        '<button type="button" class="card p-' + key + '" data-id="' + escapeHtml(issue.id) + '">' +
          '<div class="body">' +
            '<h3 class="title">' + escapeHtml(issue.title) + "</h3>" +
            '<div class="meta">' +
              '<span class="id">' + escapeHtml(issue.id) + "</span>" +
              sourceBadge(issue.source) +
              relatedBadge(issue) +
            "</div>" +
          "</div>" +
          '<span class="badge p-' + key + '">' + escapeHtml(key) + "</span>" +
        "</button>"
      );
    }

    function renderQueue(issues) {
      const ordered = sortCriticalFirst(issues);
      const main = document.getElementById("main");
      main.innerHTML =
        '<div class="queue">' + ordered.map(issueCard).join("") + "</div>";
      main.querySelectorAll(".card[data-id]").forEach(function (card) {
        card.addEventListener("click", function () {
          selectIssue(card.getAttribute("data-id"));
        });
      });
    }

    function findIssue(id) {
      return AppState.issues.find(function (issue) { return String(issue.id) === String(id); });
    }

    function renderDetail(issue) {
      const key = issue.priority || "untriaged";
      const repro = issue.repro_steps
        ? '<p class="detail-text">' + escapeHtml(issue.repro_steps) + "</p>"
        : '<p class="detail-empty">No repro steps captured yet.</p>';
      document.getElementById("main").innerHTML =
        '<div class="toolbar"><button type="button" class="back-btn" id="back-to-queue">&larr; Queue</button></div>' +
        '<article class="detail p-' + key + '">' +
          "<h1>" + escapeHtml(issue.title) + "</h1>" +
          '<div class="meta">' +
            sourceBadge(issue.source) +
            '<span class="id">' + escapeHtml(issue.id) + "</span>" +
            '<span class="badge p-' + key + '">' + escapeHtml(key) + "</span>" +
          "</div>" +
          '<section class="detail-section">' +
            "<h2>Report</h2>" +
            '<p class="detail-text">' + escapeHtml(issue.body || "") + "</p>" +
          "</section>" +
          '<section class="detail-section">' +
            "<h2>Repro Steps</h2>" +
            repro +
          "</section>" +
        "</article>";
      document.getElementById("back-to-queue").addEventListener("click", function () {
        AppState.selectedId = null;
        renderQueue(AppState.issues);
      });
    }

    function selectIssue(id) {
      const issue = findIssue(id);
      if (!issue) return;
      AppState.selectedId = id;
      renderDetail(issue);
    }

    function renderLoading() {
      const row =
        '<div class="skeleton"><div class="sk-body">' +
        '<div class="sk-line lg"></div><div class="sk-line sm"></div>' +
        '</div><div class="sk-pill"></div></div>';
      document.getElementById("main").innerHTML =
        '<div class="queue" aria-busy="true" aria-label="Loading issues">' +
        row.repeat(6) + "</div>";
    }

    function renderEmpty() {
      document.getElementById("main").innerHTML =
        '<div class="state">' +
          '<div class="glyph">✓</div>' +
          "<h2>Queue is clear</h2>" +
          "<p>No issues to triage right now. New GitHub issues and seeded " +
          "Slack/email feedback will appear here automatically.</p>" +
        "</div>";
    }

    function renderError(message) {
      document.getElementById("main").innerHTML =
        '<div class="state error">' +
          '<div class="glyph">!</div>' +
          "<h2>Couldn’t load the queue</h2>" +
          "<p>" + escapeHtml(message) + "</p>" +
          '<button type="button" onclick="boot()">Retry</button>' +
        "</div>";
    }

    function renderSourcePill() {
      const pill = document.getElementById("source-pill");
      const label = document.getElementById("source-label");
      pill.classList.remove("live", "mock");
      if (DataSource.mode === "live") {
        pill.classList.add("live");
        label.textContent = "live pod";
      } else {
        pill.classList.add("mock");
        label.textContent = "mock data";
      }
    }

    async function boot() {
      renderLoading();
      try {
        await DataSource.init();
        renderSourcePill();
        const issues = await DataSource.listIssues();
        AppState.issues = issues || [];
        if (!issues || issues.length === 0) {
          renderEmpty();
        } else {
          renderQueue(AppState.issues);
        }
      } catch (err) {
        console.error(err);
        renderError((err && err.message) || "Unknown error.");
      }
    }

    // Load the SDK from the injected API origin, then boot. If there is no
    // injected config (local/static serving), boot straight into mock mode.
    (function () {
      const cfg = window.__LEMMA_CONFIG__;
      if (!cfg || !cfg.apiUrl) { boot(); return; }
      const base = cfg.apiUrl.replace(/\/$/, "");
      const s = document.createElement("script");
      s.src = base + "/public/sdk/lemma-client.js";
      s.onload = boot;
      s.onerror = boot;   // SDK unavailable → mock mode, still serves
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
