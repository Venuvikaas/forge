<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forge — Priority Queue</title>
  <style>
    /* ============================================================
       FOUNDRY — Forge's visual system.
       Triage priority is heat: a critical bug is white-hot and glows;
       lower priorities cool down to grey iron. The queue is a thermal
       readout, the header is a furnace gauge. One warm palette, one cool
       counterpoint (quenched-steel teal) for live/interactive state.
    ============================================================ */
    :root {
      /* cooled iron — warm near-black, never pure #000 */
      --iron:    #14110d;
      --panel:   #1d1812;
      --panel-2: #261f16;
      --edge:    #322a20;
      --edge-2:  #4a3d2c;
      --text:    #f3ece0;
      --text-2:  #b8aa93;
      --mute:    #837663;
      /* the heat scale — the brand IS the priority colors */
      --crit:    #ff5a2c;   --crit-ink:#1a0d06;
      --high:    #ff9d2e;
      --norm:    #e7b53c;
      --low:     #9a8d7c;
      --crit-glow: rgba(255,90,44,0.50);
      --high-glow: rgba(255,157,46,0.30);
      /* quenched steel — the one cool note: live + focus + links */
      --quench:  #5bb8b0;
      --quench-dim: rgba(91,184,176,0.16);

      --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s8:36px;
      --r:8px; --r-lg:13px;
      --mono: ui-monospace, "SF Mono", "Cascadia Mono", "JetBrains Mono", Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      /* heat rising from the top of the forge */
      background:
        radial-gradient(135% 70% at 50% -15%, #2a1d11 0%, rgba(42,29,17,0) 55%),
        var(--iron);
      background-attachment: fixed;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- App shell ---- */
    .app { max-width: 880px; margin: 0 auto; padding: var(--s8) var(--s4) var(--s8); }
    header.bar {
      display: flex; align-items: center; gap: var(--s4);
      padding-bottom: var(--s4);
      border-bottom: 1px solid var(--edge);
      margin-bottom: var(--s6);
    }
    .logo {
      display: flex; align-items: baseline; gap: var(--s2);
      font-weight: 800; font-size: 19px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--text);
    }
    .logo .spark {
      font-size: 13px; color: var(--crit);
      text-shadow: 0 0 10px var(--crit-glow);
      animation: ember 3.2s ease-in-out infinite;
    }
    @keyframes ember { 0%,100% { opacity: .82; } 50% { opacity: 1; } }
    .tagline {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
      color: var(--mute); text-transform: lowercase;
    }
    .grow { flex: 1; }

    /* furnace gauge — the heat of the whole queue */
    .gauge {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.03em;
      color: var(--text-2); display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .gauge .g-crit { color: var(--mute); }
    .gauge.hot .g-crit { color: var(--crit); text-shadow: 0 0 10px var(--crit-glow); font-weight: 700; }
    .gauge .g-sep { color: var(--edge-2); }
    .gauge .g-total { color: var(--mute); }

    /* connection / data-source pill */
    .pill {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.02em;
      padding: 3px 10px; border-radius: 999px;
      border: 1px solid var(--edge-2); color: var(--text-2);
      display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mute); }
    .pill.live { border-color: rgba(91,184,176,0.45); color: var(--quench); }
    .pill.live .dot { background: var(--quench); box-shadow: 0 0 8px var(--quench); }
    .pill.mock .dot { background: var(--high); }

    main { min-height: 200px; }
    .placeholder { color: var(--mute); text-align: center; padding: var(--s8) 0; font-size: 13px; }

    /* ---- Filters ---- */
    .filters {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--s3);
      margin-bottom: var(--s5); padding-bottom: var(--s4);
      border-bottom: 1px solid var(--edge);
    }
    .filter-group {
      display: flex; align-items: center; gap: var(--s2);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--mute);
    }
    .filter-group select {
      color: var(--text); background: var(--panel);
      border: 1px solid var(--edge-2); border-radius: var(--r);
      padding: 7px 28px 7px 10px; font: inherit; cursor: pointer;
    }
    .filter-group select:focus-visible { border-color: var(--quench); outline: none; }
    .clear-btn {
      font: inherit; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-2); background: transparent; border: 1px solid var(--edge-2);
      border-radius: var(--r); padding: 7px 12px; cursor: pointer;
    }
    .clear-btn:hover, .clear-btn:focus-visible { color: var(--text); border-color: var(--quench); outline: none; }

    /* ---- Queue ---- */
    .queue { display: flex; flex-direction: column; gap: var(--s3); }
    .card {
      position: relative; overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: var(--r-lg);
      padding: var(--s4) var(--s4) var(--s4) calc(var(--s4) + 6px);
      display: flex; align-items: center; gap: var(--s4);
      transition: border-color .14s ease, background .14s ease, transform .14s ease;
      cursor: pointer; width: 100%; text-align: left;
    }
    /* the heat rail — a glowing bar of the issue's temperature */
    .card::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--edge-2);
    }
    .card:hover, .card:focus-visible {
      border-color: var(--edge-2); background: var(--panel-2);
      transform: translateX(2px); outline: none;
    }
    .card .body { flex: 1; min-width: 0; }
    .card .title {
      font-size: 15px; font-weight: 650; color: var(--text); margin: 0 0 var(--s2);
      letter-spacing: -0.01em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .card .meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--s2);
      font-family: var(--mono); font-size: 11px; color: var(--mute);
    }
    .card .meta .id { color: var(--text-2); }

    .source {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
      border: 1px solid var(--edge-2); color: var(--text-2); white-space: nowrap;
    }
    .source.s-github { color: #d6cdbe; border-color: #5b4f3c; background: rgba(120,108,86,0.14); }
    .source.s-slack  { color: var(--norm); border-color: rgba(231,181,60,0.5); background: rgba(231,181,60,0.08); }
    .source.s-email  { color: var(--quench); border-color: rgba(91,184,176,0.5); background: var(--quench-dim); }

    /* priority chip — incandescence as hierarchy:
       critical = filled white-hot, then strong outline, then quiet grey */
    .badge {
      flex-shrink: 0;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 999px;
      border: 1px solid var(--edge-2); color: var(--text-2); white-space: nowrap;
    }
    .badge.p-critical {
      color: var(--crit-ink); background: var(--crit); border-color: var(--crit);
      box-shadow: 0 0 14px var(--crit-glow);
    }
    .badge.p-high     { color: var(--high); border-color: var(--high); background: rgba(255,157,46,0.12); }
    .badge.p-normal   { color: var(--norm); border-color: rgba(231,181,60,0.7); background: rgba(231,181,60,0.10); }
    .badge.p-low      { color: var(--low);  border-color: var(--edge-2); background: transparent; }
    .badge.p-untriaged{ color: var(--mute); border-style: dashed; }

    .related-badge {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.03em;
      padding: 2px 8px; border-radius: 999px;
      border: 1px solid rgba(91,184,176,0.5); color: var(--quench);
      background: var(--quench-dim); white-space: nowrap;
    }

    /* heat rail + critical glow, per priority */
    .card.p-critical::before { background: linear-gradient(var(--crit), #c33a16); box-shadow: 0 0 16px var(--crit-glow); }
    .card.p-high::before     { background: var(--high); }
    .card.p-normal::before   { background: var(--norm); }
    .card.p-low::before      { background: var(--low); }
    .card.p-untriaged::before{ background: var(--edge-2); }
    .card.p-critical {
      border-color: rgba(255,90,44,0.42);
      box-shadow: 0 0 0 1px rgba(255,90,44,0.10), 0 10px 36px -14px var(--crit-glow);
    }
    .card.p-critical:hover, .card.p-critical:focus-visible {
      border-color: rgba(255,90,44,0.7);
      box-shadow: 0 0 0 1px rgba(255,90,44,0.18), 0 12px 40px -12px var(--crit-glow);
    }

    /* ---- Detail view ---- */
    .toolbar { margin-bottom: var(--s4); }
    .back-btn {
      font: inherit; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-2); background: transparent; border: 1px solid var(--edge-2);
      border-radius: var(--r); padding: 8px 13px; cursor: pointer;
    }
    .back-btn:hover, .back-btn:focus-visible { color: var(--text); border-color: var(--quench); outline: none; }
    .detail-actions {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--s3);
      margin: calc(-1 * var(--s2)) 0 var(--s5);
    }
    .investigate-btn {
      font: inherit; font-size: 11px; font-weight: 750;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--crit-ink); background: var(--high);
      border: 1px solid var(--high); border-radius: var(--r);
      padding: 9px 14px; cursor: pointer;
      box-shadow: 0 0 16px rgba(255,157,46,0.18);
    }
    .investigate-btn:hover, .investigate-btn:focus-visible {
      background: #ffad4f; outline: none;
    }
    .investigate-btn[disabled] {
      cursor: default; opacity: .72; box-shadow: none;
    }
    .investigation-status {
      border: 1px solid var(--edge);
      background: var(--panel-2);
      border-radius: var(--r);
      padding: var(--s4);
      margin-bottom: var(--s5);
    }
    .investigation-status .status-title {
      margin: 0 0 var(--s3);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--quench);
    }
    .investigation-status.error .status-title { color: var(--crit); }
    .investigation-steps {
      display: grid; gap: var(--s2); margin: 0; padding: 0; list-style: none;
    }
    .investigation-step {
      display: flex; align-items: center; gap: var(--s2);
      color: var(--text-2); font-size: 13px;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--edge-2); flex: 0 0 auto;
    }
    .investigation-step.active .step-dot {
      background: var(--quench); box-shadow: 0 0 10px var(--quench);
    }
    .investigation-step.done .step-dot { background: var(--norm); }
    .investigation-step.pending { color: var(--mute); }
    .evidence-grid {
      display: grid; gap: var(--s2);
    }
    .evidence-card {
      display: grid; gap: 3px;
      background: var(--panel-2); border: 1px solid var(--edge);
      border-radius: var(--r); padding: 11px 12px;
      color: var(--text); text-decoration: none;
      transition: border-color .14s ease, transform .14s ease;
    }
    .evidence-card:hover, .evidence-card:focus-visible {
      border-color: var(--quench); transform: translateX(2px); outline: none;
    }
    .evidence-type {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--quench);
    }
    .evidence-label {
      color: var(--text-2); font-size: 13px;
      overflow-wrap: anywhere;
    }
    .hypothesis-card {
      border: 1px solid rgba(255,157,46,0.38);
      background: rgba(255,157,46,0.08);
      border-radius: var(--r);
      padding: var(--s4);
    }
    .hypothesis-card p {
      margin: 0; color: var(--text); font-size: 14px; line-height: 1.65;
    }
    .detail {
      position: relative; overflow: hidden;
      background: var(--panel); border: 1px solid var(--edge);
      border-radius: var(--r-lg); padding: var(--s6) var(--s6) var(--s6) calc(var(--s6) + 4px);
    }
    .detail::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--edge-2); }
    .detail.p-critical::before { background: linear-gradient(var(--crit), #c33a16); box-shadow: 0 0 18px var(--crit-glow); }
    .detail.p-high::before     { background: var(--high); }
    .detail.p-normal::before   { background: var(--norm); }
    .detail.p-low::before      { background: var(--low); }
    .detail.p-untriaged::before{ background: var(--edge-2); }
    .detail.p-critical { box-shadow: 0 12px 44px -16px var(--crit-glow); }
    .detail h1 {
      font-size: 25px; line-height: 1.22; margin: 0 0 var(--s4);
      letter-spacing: -0.02em; font-weight: 750;
    }
    .detail .meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--s2);
      margin-bottom: var(--s6);
    }
    .detail .meta .id { font-family: var(--mono); font-size: 11px; color: var(--text-2); }
    .detail-section { border-top: 1px solid var(--edge); padding-top: var(--s4); margin-top: var(--s5); }
    .detail-section h2 {
      margin: 0 0 var(--s3); font-size: 10px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--mute);
      display: flex; align-items: center; gap: var(--s2);
    }
    .detail-section h2::before { content: ""; width: 10px; height: 1px; background: var(--edge-2); }
    .detail-text {
      color: var(--text-2); white-space: pre-wrap; overflow-wrap: anywhere;
      margin: 0; font-size: 14px; line-height: 1.65;
    }
    .detail-empty { color: var(--mute); font-size: 13px; margin: 0; font-style: italic; }
    .related-list { display: flex; flex-direction: column; gap: var(--s2); margin: 0; padding: 0; list-style: none; }
    .related-link {
      width: 100%; display: flex; align-items: center; gap: var(--s2);
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--edge); border-radius: var(--r);
      padding: 10px 12px; cursor: pointer; text-align: left; font: inherit;
      transition: border-color .14s ease, transform .14s ease;
    }
    .related-link:hover, .related-link:focus-visible {
      border-color: var(--quench); transform: translateX(2px); outline: none;
    }
    .related-link .rel-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
    .related-link .rel-id { font-family: var(--mono); font-size: 11px; color: var(--mute); white-space: nowrap; }

    footer {
      margin-top: var(--s8); padding-top: var(--s4); border-top: 1px solid var(--edge);
      color: var(--mute); font-size: 11px; letter-spacing: 0.03em; text-align: center;
    }
    footer code { font-family: var(--mono); color: var(--text-2); }

    /* ---- Loading skeletons (not spinners): a cooling forge ---- */
    .skeleton {
      position: relative; overflow: hidden;
      background: var(--panel); border: 1px solid var(--edge);
      border-radius: var(--r-lg); padding: var(--s4) var(--s4) var(--s4) calc(var(--s4) + 6px);
      display: flex; align-items: center; gap: var(--s4);
    }
    .skeleton::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--edge); }
    .skeleton .sk-body { flex: 1; }
    .sk-line { height: 12px; border-radius: 6px; background: var(--panel-2); position: relative; overflow: hidden; }
    .sk-line.lg { width: 58%; height: 15px; margin-bottom: 10px; }
    .sk-line.sm { width: 28%; }
    .sk-pill { width: 70px; height: 24px; border-radius: 999px; background: var(--panel-2); position: relative; overflow: hidden; }
    .sk-line::after, .sk-pill::after {
      content: ""; position: absolute; inset: 0; transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,157,46,0.10), transparent);
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }

    /* ---- Empty / error states ---- */
    .state { text-align: center; padding: var(--s8) var(--s4); color: var(--text-2); }
    .state .glyph { font-size: 30px; line-height: 1; margin-bottom: var(--s3); color: var(--mute); }
    .state h2 { font-size: 16px; font-weight: 650; color: var(--text); margin: 0 0 var(--s2); letter-spacing: -0.01em; }
    .state p { margin: 0 auto; max-width: 380px; font-size: 13px; color: var(--mute); }
    .state.error .glyph { color: var(--crit); text-shadow: 0 0 16px var(--crit-glow); }
    .state code { font-family: var(--mono); color: var(--text-2); font-size: 12px; }
    .state button {
      margin-top: var(--s4); font: inherit; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--crit-ink); background: var(--high); border: 0;
      padding: 9px 18px; border-radius: var(--r); cursor: pointer; font-weight: 700;
    }
    .state button:hover { background: #ffad4f; }

    @media (prefers-reduced-motion: reduce) {
      .sk-line::after, .sk-pill::after { animation: none; }
      .logo .spark { animation: none; }
      .card, .related-link { transition: none; }
      .card:hover, .related-link:hover { transform: none; }
    }
    @media (max-width: 560px) {
      .app { padding: var(--s6) var(--s3) var(--s8); }
      .tagline { display: none; }
      .detail { padding: var(--s5) var(--s4) var(--s5) calc(var(--s4) + 4px); }
      .detail h1 { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="bar">
      <span class="logo"><span class="spark">◆</span>Forge</span>
      <span class="tagline">triage furnace</span>
      <span class="grow"></span>
      <span id="furnace-gauge" class="gauge" aria-live="polite"></span>
      <span id="source-pill" class="pill"><span class="dot"></span><span id="source-label">connecting…</span></span>
    </header>

    <main id="main">
      <div class="placeholder">Loading…</div>
    </main>

    <footer>
      AI bug-triage operator console · built on the <code>Lemma SDK</code>
    </footer>
  </div>

  <script>
    /* ----------------------------------------------------------------
       Lemma SDK boot.
       The pod host injects window.__LEMMA_CONFIG__ (podId, apiUrl, authUrl)
       at serve time and the SDK is loaded from cfg.apiUrl. When the page is
       served standalone for local development (Day 1, mock data), neither is
       present — we degrade to "mock" mode and read seed/issues.json so the
       queue still renders. The data seam lives in DataSource.listIssues().
    ---------------------------------------------------------------- */
    /* Embedded sample queue — the safety net. Used only when we're NOT live
       (not signed in, or the pod is unreachable). The deployed app is a single
       file with no seed/ sibling, so a relative fetch can't be the fallback;
       this inline curated set (a slice of seed/issues.json, same contract §1
       shape) guarantees the console always renders something real-looking. */
    const SAMPLE_ISSUES = [
      { id: "gh_142", source: "github", external_id: "142", priority: "critical", status: "triaged",
        related_ids: ["iss_003"], linked_prs: [],
        title: "Panic on `gh pr create` when repo has no upstream remote",
        body: "Running `gh pr create` in a freshly cloned fork with no `upstream` configured crashes with a nil pointer dereference instead of a helpful error.\n\npanic: runtime error: invalid memory address or nil pointer dereference",
        repro_steps: "- Fork a repo and clone your fork\n- Do NOT add an `upstream` remote\n- Run `gh pr create`\n- Observe the panic" },
      { id: "iss_003", source: "slack", external_id: null, priority: "high", status: "triaged",
        related_ids: ["gh_142"], linked_prs: [],
        title: "gh pr create just crashes if origin isn't set up right",
        body: "from #eng-help: \"hey is anyone else seeing `gh pr create` straight up crash? it dies with some go panic about a nil pointer. no upstream remote on my side.\"",
        repro_steps: "- Clone a fork without an upstream remote\n- Run `gh pr create`\n- Crash instead of a guided prompt" },
      { id: "gh_158", source: "github", external_id: "158", priority: "critical", status: "triaged",
        related_ids: ["iss_007"], linked_prs: [],
        title: "Auth token not refreshed — 401 after SSO session expiry",
        body: "After my org's SSO session expires (~8h), every `gh` command returns `HTTP 401: Bad credentials`. The stored token is never refreshed and there is no prompt to re-authenticate.",
        repro_steps: "- `gh auth login` with an SSO-enforced org\n- Wait ~8 hours for the session to expire\n- Run any command\n- Persistent `HTTP 401: Bad credentials`" },
      { id: "iss_007", source: "email", external_id: null, priority: "high", status: "triaged",
        related_ids: ["gh_158"], linked_prs: [],
        title: "Getting 401 errors after being logged in for a few hours",
        body: "Forwarded from support@: \"I log in fine in the morning but by mid-afternoon every command fails with a 401. Logging in again fixes it. We use Okta SSO.\"",
        repro_steps: "- Authenticate in the morning via Okta SSO\n- Use the CLI normally\n- Commands fail with 401 until re-login" },
      { id: "gh_175", source: "github", external_id: "175", priority: "critical", status: "triaged",
        related_ids: [], linked_prs: [],
        title: "Data loss: `gh gist edit` silently truncates files larger than 1MB",
        body: "Editing a gist whose file is >1MB through `gh gist edit` saves a truncated version, silently discarding everything past ~1MB. No warning.",
        repro_steps: "- Create a gist with a file >1MB\n- `gh gist edit <id>` and save\n- The remote file is truncated to ~1MB" },
      { id: "gh_171", source: "github", external_id: "171", priority: "high", status: "triaged",
        related_ids: ["iss_011"], linked_prs: [],
        title: "`gh repo clone` hangs indefinitely on large repos behind a corporate proxy",
        body: "Cloning a >1GB repo through our corporate HTTPS proxy hangs forever — no progress, no timeout. Plain `git clone` works. Looks like the CLI isn't honoring `HTTPS_PROXY`.",
        repro_steps: "- Set `HTTPS_PROXY` to a corporate proxy\n- `gh repo clone owner/large-repo`\n- Hangs with no output" },
      { id: "iss_011", source: "slack", external_id: null, priority: "normal", status: "triaged",
        related_ids: ["gh_171"], linked_prs: [],
        title: "clone freezes forever on the corp proxy",
        body: "from #it-support: \"anyone got `gh repo clone` working on the VPN/proxy? mine just freezes, no error, no progress bar. regular git clone is fine.\"",
        repro_steps: "- On corporate VPN/proxy\n- `gh repo clone` a moderately large repo\n- Hangs with no feedback" },
      { id: "gh_180", source: "github", external_id: "180", priority: "low", status: "triaged",
        related_ids: [], linked_prs: [],
        title: "Autocompletion script for zsh emits a deprecation warning on macOS",
        body: "`eval \"$(gh completion -s zsh)\"` prints `compdef: function definition file not found` warnings on macOS 14. Functional but noisy.",
        repro_steps: "- macOS 14, default zsh\n- Add the completion eval to `.zshrc`\n- Open a new shell — warning prints" }
    ];

    const DataSource = {
      mode: "mock",          // "live" (pod), "seed" (local file), or "sample" (embedded)
      client: null,
      user: null,
      async init() {
        const cfg = window.__LEMMA_CONFIG__;
        if (cfg && window.LemmaClient) {
          // One retry: the pod backend can 503/timeout transiently on first hit.
          for (let attempt = 0; attempt < 2 && this.mode !== "live"; attempt++) {
            try {
              this.client = this.client || new window.LemmaClient.LemmaClient();
              const state = await this.client.initialize();   // { status, user }
              if (state && state.status === "authenticated") {
                this.mode = "live";
                this.user = state.user || null;
              }
            } catch (err) {
              console.warn("Lemma init attempt " + (attempt + 1) + " failed:", err);
            }
          }
        }
        return this.mode;
      },

      /* The data seam. Live reads the real `issues` Table; otherwise we try a
         local seed file (dev convenience) and finally the embedded sample —
         so the deployed app NEVER dead-ends on a missing seed file. */
      async listIssues() {
        if (this.mode === "live") {
          const res = await this.client.records.list("issues", { limit: 100 });
          const items = (res && res.items) || res || [];
          // Records come back as flat row objects (contract §1 fields at top
          // level). Unwrap defensively in case a row is delivered as {payload}.
          return items.map(function (r) {
            return r && r.payload && r.title === undefined
              ? Object.assign({ id: r.id }, r.payload)
              : r;
          });
        }
        try {
          const res = await fetch("../seed/issues.json", { cache: "no-store" });
          if (res.ok) { this.mode = "seed"; return await res.json(); }
        } catch (err) { /* no local seed (e.g. deployed) — use embedded sample */ }
        this.mode = "sample";
        return SAMPLE_ISSUES;
      },

      async triggerInvestigation(issue) {
        if (this.mode === "live" && this.client && this.client.workflows) {
          const workflows = this.client.workflows;
          if (typeof workflows.createRun === "function") {
            const run = await workflows.createRun("investigate");
            const runId = run && (run.id || run.run_id);
            if (typeof workflows.submitForm === "function") {
              await workflows.submitForm(runId, { issue_id: issue.id });
            }
            return { mode: "live", run_id: runId || null };
          }
          if (typeof workflows.create_run === "function") {
            const run = await workflows.create_run("investigate");
            const runId = run && (run.id || run.run_id);
            if (typeof workflows.submit_form === "function") {
              await workflows.submit_form(runId, "issue_form", { issue_id: issue.id });
            }
            return { mode: "live", run_id: runId || null };
          }
        }
        return { mode: "mock", run_id: "mock-" + issue.id };
      },
    };

    function escapeHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function safeUrl(url) {
      const value = String(url || "");
      if (/^(https?:\/\/|\/|#)/.test(value)) return value;
      return "#";
    }

    // Critical-first ordering. Lower rank = higher up the queue; untriaged sinks
    // to the bottom. Ties broken by most-recently-updated.
    const PRIORITY_RANK = { critical: 0, high: 1, normal: 2, low: 3 };
    const AppState = {
      issues: [],
      selectedId: null,
      filters: { priority: "all", source: "all" },
      investigations: {},
    };

    function priorityRank(p) {
      return p && p in PRIORITY_RANK ? PRIORITY_RANK[p] : 99;
    }
    function sortCriticalFirst(issues) {
      return issues.slice().sort(function (a, b) {
        const r = priorityRank(a.priority) - priorityRank(b.priority);
        if (r !== 0) return r;
        return String(b.updated_at || "").localeCompare(String(a.updated_at || ""));
      });
    }

    function applyFilters(issues) {
      return issues.filter(function (issue) {
        const priority = issue.priority || "untriaged";
        const source = issue.source || "unknown";
        return (AppState.filters.priority === "all" || AppState.filters.priority === priority) &&
          (AppState.filters.source === "all" || AppState.filters.source === source);
      });
    }

    const SOURCE_LABELS = { github: "GitHub", slack: "Slack", email: "Email" };
    function sourceBadge(source) {
      const key = SOURCE_LABELS[source] ? source : "unknown";
      const label = SOURCE_LABELS[source] || String(source || "Unknown");
      return '<span class="source s-' + escapeHtml(key) + '">' + escapeHtml(label) + "</span>";
    }

    function relatedCount(issue) {
      return Array.isArray(issue.related_ids) ? issue.related_ids.length : 0;
    }

    function relatedBadge(issue) {
      const count = relatedCount(issue);
      if (!count) return "";
      return '<span class="related-badge">' + count + " related</span>";
    }

    function issueCard(issue) {
      const key = issue.priority || "untriaged";
      return (
        '<button type="button" class="card p-' + key + '" data-id="' + escapeHtml(issue.id) + '">' +
          '<div class="body">' +
            '<h3 class="title">' + escapeHtml(issue.title) + "</h3>" +
            '<div class="meta">' +
              '<span class="id">' + escapeHtml(issue.id) + "</span>" +
              sourceBadge(issue.source) +
              relatedBadge(issue) +
            "</div>" +
          "</div>" +
          '<span class="badge p-' + key + '">' + escapeHtml(key) + "</span>" +
        "</button>"
      );
    }

    function renderQueue(issues) {
      const filtered = applyFilters(issues);
      const ordered = sortCriticalFirst(filtered);
      const main = document.getElementById("main");
      main.innerHTML =
        renderFilters() +
        (ordered.length
          ? '<div class="queue">' + ordered.map(issueCard).join("") + "</div>"
          : '<div class="state"><div class="glyph">∅</div><h2>No matches</h2><p>Adjust the priority or source filter.</p></div>');
      bindFilters();
      main.querySelectorAll(".card[data-id]").forEach(function (card) {
        card.addEventListener("click", function () {
          selectIssue(card.getAttribute("data-id"));
        });
      });
    }

    function selectOption(value, label, current) {
      return '<option value="' + escapeHtml(value) + '"' +
        (value === current ? " selected" : "") + ">" + escapeHtml(label) + "</option>";
    }

    function renderFilters() {
      const p = AppState.filters.priority;
      const s = AppState.filters.source;
      return (
        '<div class="filters" aria-label="Queue filters">' +
          '<label class="filter-group">Priority ' +
            '<select id="priority-filter">' +
              selectOption("all", "All", p) +
              selectOption("critical", "Critical", p) +
              selectOption("high", "High", p) +
              selectOption("normal", "Normal", p) +
              selectOption("low", "Low", p) +
              selectOption("untriaged", "Untriaged", p) +
            "</select>" +
          "</label>" +
          '<label class="filter-group">Source ' +
            '<select id="source-filter">' +
              selectOption("all", "All", s) +
              selectOption("github", "GitHub", s) +
              selectOption("slack", "Slack", s) +
              selectOption("email", "Email", s) +
            "</select>" +
          "</label>" +
          '<button type="button" class="clear-btn" id="clear-filters">Clear</button>' +
        "</div>"
      );
    }

    function bindFilters() {
      const priority = document.getElementById("priority-filter");
      const source = document.getElementById("source-filter");
      const clear = document.getElementById("clear-filters");
      priority.addEventListener("change", function () {
        AppState.filters.priority = priority.value;
        renderQueue(AppState.issues);
      });
      source.addEventListener("change", function () {
        AppState.filters.source = source.value;
        renderQueue(AppState.issues);
      });
      clear.addEventListener("click", function () {
        AppState.filters.priority = "all";
        AppState.filters.source = "all";
        renderQueue(AppState.issues);
      });
    }

    function findIssue(id) {
      return AppState.issues.find(function (issue) { return String(issue.id) === String(id); });
    }

    function renderRelatedList(issue) {
      const ids = Array.isArray(issue.related_ids) ? issue.related_ids : [];
      if (!ids.length) return '<p class="detail-empty">No confirmed related issues yet.</p>';
      return (
        '<ul class="related-list">' +
        ids.map(function (id) {
          const related = findIssue(id);
          const title = related ? related.title : "Related issue not loaded";
          return (
            '<li><button type="button" class="related-link" data-related-id="' + escapeHtml(id) + '">' +
              '<span class="rel-title">' + escapeHtml(title) + "</span>" +
              '<span class="rel-id">' + escapeHtml(id) + "</span>" +
            "</button></li>"
          );
        }).join("") +
        "</ul>"
      );
    }

    function renderInvestigationStatus(investigation) {
      if (!investigation || investigation.status === "idle") return "";
      if (investigation.status === "error") {
        return (
          '<div class="investigation-status error">' +
            '<p class="status-title">Investigation blocked</p>' +
            '<p class="detail-empty">' + escapeHtml(investigation.message || "Workflow run failed to start.") + "</p>" +
          "</div>"
        );
      }
      if (investigation.status === "complete") {
        return (
          '<div class="investigation-status">' +
            '<p class="status-title">Investigation complete</p>' +
            '<ol class="investigation-steps">' +
              '<li class="investigation-step done"><span class="step-dot"></span><span>Workflow run queued</span></li>' +
              '<li class="investigation-step done"><span class="step-dot"></span><span>Evidence gathered</span></li>' +
              '<li class="investigation-step done"><span class="step-dot"></span><span>Hypothesis synthesized</span></li>' +
            "</ol>" +
          "</div>"
        );
      }
      const phase = investigation.phase || "queued";
      const steps = [
        { key: "queued", label: "Workflow run queued" },
        { key: "evidence", label: "Gathering issue, related reports, and code evidence" },
        { key: "synthesis", label: "Synthesizing root-cause hypothesis" },
      ];
      const phaseIndex = steps.findIndex(function (step) { return step.key === phase; });
      return (
        '<div class="investigation-status" aria-live="polite">' +
          '<p class="status-title">Investigation running</p>' +
          '<ol class="investigation-steps">' +
            steps.map(function (step, idx) {
              const state = idx < phaseIndex ? "done" : (idx === phaseIndex ? "active" : "pending");
              return '<li class="investigation-step ' + state + '"><span class="step-dot"></span>' +
                '<span>' + escapeHtml(step.label) + "</span></li>";
            }).join("") +
          "</ol>" +
        "</div>"
      );
    }

    function githubIssueUrl(issue) {
      if (issue && issue.source === "github" && issue.external_id) {
        return "https://github.com/cli/cli/issues/" + encodeURIComponent(issue.external_id);
      }
      return "#" + encodeURIComponent(issue && issue.id ? issue.id : "issue");
    }

    function mockEvidenceForIssue(issue) {
      const related = (Array.isArray(issue.related_ids) ? issue.related_ids : [])
        .map(findIssue)
        .filter(Boolean)
        .slice(0, 2);
      const evidence = [
        {
          type: "issue",
          label: issue.id + ": " + issue.title,
          url: githubIssueUrl(issue),
        },
        {
          type: "file",
          label: "/issues/" + issue.id + ".md",
          url: "/issues/" + encodeURIComponent(issue.id) + ".md",
        },
      ];
      related.forEach(function (item) {
        evidence.push({
          type: "issue",
          label: item.id + ": " + item.title,
          url: githubIssueUrl(item),
        });
      });
      return evidence.slice(0, 3);
    }

    function mockHypothesisForIssue(issue) {
      const related = relatedCount(issue);
      const repro = issue.repro_steps ? "the captured repro steps" : "the original report";
      return "Start investigation in the code path described by " + repro +
        (related ? " and compare it with the linked related reports." : ".") +
        " The evidence below is the basis for this hypothesis.";
    }

    function renderHypothesisSummary(investigation) {
      if (!investigation || !investigation.hypothesis) return "";
      return (
        '<section class="detail-section">' +
          "<h2>Root-cause hypothesis</h2>" +
          '<div class="hypothesis-card"><p>' + escapeHtml(investigation.hypothesis) + "</p></div>" +
        "</section>"
      );
    }

    function renderEvidenceCards(investigation) {
      const evidence = investigation && Array.isArray(investigation.evidence)
        ? investigation.evidence
        : [];
      if (!evidence.length) return "";
      return (
        '<section class="detail-section">' +
          "<h2>Evidence</h2>" +
          '<div class="evidence-grid">' +
            evidence.map(function (item) {
              return (
                '<a class="evidence-card" href="' + escapeHtml(safeUrl(item.url)) + '" target="_blank" rel="noreferrer">' +
                  '<span class="evidence-type">' + escapeHtml(item.type || "evidence") + "</span>" +
                  '<span class="evidence-label">' + escapeHtml(item.label || item.url || "Evidence link") + "</span>" +
                "</a>"
              );
            }).join("") +
          "</div>" +
        "</section>"
      );
    }

    function renderDetail(issue) {
      const key = issue.priority || "untriaged";
      const investigation = AppState.investigations[issue.id] || { status: "idle" };
      const investigating = investigation.status === "running";
      const repro = issue.repro_steps
        ? '<p class="detail-text">' + escapeHtml(issue.repro_steps) + "</p>"
        : '<p class="detail-empty">No repro steps captured yet.</p>';
      document.getElementById("main").innerHTML =
        '<div class="toolbar"><button type="button" class="back-btn" id="back-to-queue">&larr; Queue</button></div>' +
        '<article class="detail p-' + key + '">' +
          "<h1>" + escapeHtml(issue.title) + "</h1>" +
          '<div class="meta">' +
            sourceBadge(issue.source) +
            '<span class="id">' + escapeHtml(issue.id) + "</span>" +
            '<span class="badge p-' + key + '">' + escapeHtml(key) + "</span>" +
          "</div>" +
          '<div class="detail-actions">' +
            '<button type="button" class="investigate-btn" id="investigate-issue"' +
              (investigating ? " disabled" : "") + ">" +
              (investigating ? "Investigating" : "Investigate") +
            "</button>" +
          "</div>" +
          renderInvestigationStatus(investigation) +
          '<section class="detail-section">' +
            "<h2>Report</h2>" +
            '<p class="detail-text">' + escapeHtml(issue.body || "") + "</p>" +
          "</section>" +
          '<section class="detail-section">' +
            "<h2>Reproduction</h2>" +
            repro +
          "</section>" +
          '<section class="detail-section">' +
            "<h2>Related reports</h2>" +
            renderRelatedList(issue) +
          "</section>" +
          renderHypothesisSummary(investigation) +
          renderEvidenceCards(investigation) +
        "</article>";
      document.getElementById("back-to-queue").addEventListener("click", function () {
        AppState.selectedId = null;
        renderQueue(AppState.issues);
      });
      document.getElementById("investigate-issue").addEventListener("click", function () {
        startInvestigation(issue.id);
      });
      document.querySelectorAll("[data-related-id]").forEach(function (button) {
        button.addEventListener("click", function () {
          selectIssue(button.getAttribute("data-related-id"));
        });
      });
    }

    async function startInvestigation(issueId) {
      const issue = findIssue(issueId);
      if (!issue) return;
      AppState.investigations[issueId] = {
        status: "running",
        phase: "queued",
        started_at: new Date().toISOString(),
      };
      renderDetail(issue);
      try {
        const run = await DataSource.triggerInvestigation(issue);
        AppState.investigations[issueId] = Object.assign(AppState.investigations[issueId], run, {
          phase: "evidence",
          status: run.mode === "mock" ? "complete" : "running",
          hypothesis: run.mode === "mock" ? mockHypothesisForIssue(issue) : "",
          evidence: run.mode === "mock" ? mockEvidenceForIssue(issue) : [],
        });
      } catch (err) {
        AppState.investigations[issueId] = {
          status: "error",
          message: (err && err.message) || "Investigation could not start.",
        };
      }
      renderDetail(issue);
    }

    function selectIssue(id) {
      const issue = findIssue(id);
      if (!issue) return;
      AppState.selectedId = id;
      renderDetail(issue);
    }

    function renderLoading() {
      const row =
        '<div class="skeleton"><div class="sk-body">' +
        '<div class="sk-line lg"></div><div class="sk-line sm"></div>' +
        '</div><div class="sk-pill"></div></div>';
      document.getElementById("main").innerHTML =
        '<div class="queue" aria-busy="true" aria-label="Loading issues">' +
        row.repeat(6) + "</div>";
    }

    function renderEmpty() {
      document.getElementById("main").innerHTML =
        '<div class="state">' +
          '<div class="glyph">◇</div>' +
          "<h2>The forge is cold</h2>" +
          "<p>Nothing to triage right now. New GitHub issues and seeded " +
          "Slack and email reports land here automatically.</p>" +
        "</div>";
    }

    function renderError(message) {
      document.getElementById("main").innerHTML =
        '<div class="state error">' +
          '<div class="glyph">!</div>' +
          "<h2>Couldn’t load the queue</h2>" +
          "<p>" + escapeHtml(message) + "</p>" +
          '<button type="button" onclick="boot()">Retry</button>' +
        "</div>";
    }

    // Furnace gauge — the heat of the whole queue (not the filtered view).
    function renderFurnaceGauge() {
      const gauge = document.getElementById("furnace-gauge");
      if (!gauge) return;
      const crit = AppState.issues.filter(function (i) { return i.priority === "critical"; }).length;
      const total = AppState.issues.length;
      gauge.classList.toggle("hot", crit > 0);
      gauge.innerHTML =
        '<span class="g-crit">' + crit + " critical</span>" +
        '<span class="g-sep">·</span>' +
        '<span class="g-total">' + total + " in queue</span>";
    }

    const SOURCE_PILL_LABELS = { live: "live pod", seed: "seed data", sample: "sample data", mock: "sample data" };
    function renderSourcePill() {
      const pill = document.getElementById("source-pill");
      const label = document.getElementById("source-label");
      pill.classList.remove("live", "mock");
      if (DataSource.mode === "live") {
        pill.classList.add("live");
        label.textContent = "live pod";
      } else {
        pill.classList.add("mock");
        label.textContent = SOURCE_PILL_LABELS[DataSource.mode] || "sample data";
      }
    }

    async function boot() {
      renderLoading();
      try {
        await DataSource.init();
        renderSourcePill();
        const issues = await DataSource.listIssues();
        renderSourcePill();   // mode is finalized in listIssues (seed vs sample)
        AppState.issues = issues || [];
        renderFurnaceGauge();
        if (!issues || issues.length === 0) {
          renderEmpty();
        } else {
          renderQueue(AppState.issues);
        }
      } catch (err) {
        console.error(err);
        renderError((err && err.message) || "Unknown error.");
      }
    }

    // Load the SDK from the injected API origin, then boot. If there is no
    // injected config (local/static serving), boot straight into mock mode.
    (function () {
      const cfg = window.__LEMMA_CONFIG__;
      if (!cfg || !cfg.apiUrl) { boot(); return; }
      const base = cfg.apiUrl.replace(/\/$/, "");
      const s = document.createElement("script");
      s.src = base + "/public/sdk/lemma-client.js";
      s.onload = boot;
      s.onerror = boot;   // SDK unavailable → mock mode, still serves
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
