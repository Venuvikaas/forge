<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forge — Triage Cockpit</title>
  <script>
    /* Set theme before first paint to avoid a flash. */
    try {
      var _t = localStorage.getItem("forge-theme");
      if (_t !== "light" && _t !== "dark") {
        _t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
      }
      document.documentElement.setAttribute("data-theme", _t);
    } catch (e) { document.documentElement.setAttribute("data-theme", "dark"); }
  </script>
  <style>
    /* ============================================================
       FORGE COCKPIT — Neubrutalist triage workspace.
       Priority is heat, rendered as FLAT saturated blocks (no glow).
       Structure is honest: thick borders, hard offset shadows, sharp
       corners. One cool accent (cyan) carries live/interactive/selected.
       Two themes share the heat scale; only surfaces/border/shadow flip.
    ============================================================ */
    :root {
      /* heat scale — priority as flat blocks */
      --crit:#ff4a1c; --crit-ink:#190a04;
      --high:#ff9412; --high-ink:#241300;
      --norm:#ffc21c; --norm-ink:#231900;
      --low:#8b94a3;  --low-ink:#0e1014;
      --accent:#00cdbe; --accent-ink:#00201d;   /* live · links · selection */
      --ai:#b07cff;                              /* AI actor */
      --add:#37c46a; --del:#ff5d52;

      /* dark (default) — neutral graphite: hierarchy comes from surfaces, not
         outlines. Borders are soft, shadow is near-black depth, and the only
         bright note is the cyan accent reserved for interaction + selection. */
      --bg:#131313; --surface:#1d1d1d; --surface-2:#242424; --surface-3:#2d2d2d;
      --ink:#f2f1ee; --ink-2:#b3b0ab; --mute:#827e78;
      --edge:#4f4b46; --edge-soft:#35322f;
      --shadow:#050505; --field:#181818;

      --bw:2px; --bw2:3px;
      --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s8:36px;
      --mono: ui-monospace, "SF Mono", "Cascadia Mono", "JetBrains Mono", Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --display: "Arial Black", "Arial Bold", var(--sans);
    }
    [data-theme="light"] {
      --bg:#d6dbdf; --surface:#fdfcf9; --surface-2:#f1efe8; --surface-3:#e6e3da;
      --ink:#16140f; --ink-2:#4c473d; --mute:#7c7568;
      --edge:#16140f; --edge-soft:#cbc7bd;
      --shadow:#16140f; --field:#ffffff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { background: var(--bg); }
    body {
      background: var(--bg); color: var(--ink);
      font-family: var(--sans); font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      height: 100dvh; min-height: 100dvh; overflow: hidden;
      display: flex; flex-direction: column;
    }
    :focus-visible { outline: var(--bw2) solid var(--accent); outline-offset: 1px; }

    /* ---- Top instrument strip ---- */
    .topbar {
      flex: 0 0 auto; display: flex; flex-wrap: wrap; align-items: center; gap: var(--s3);
      padding: 10px var(--s4); background: var(--surface);
      border-bottom: var(--bw2) solid var(--edge);
    }
    .brand {
      font-family: var(--display); font-weight: 900; font-size: 20px;
      letter-spacing: 0.02em; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .brand .spark { color: var(--crit); font-size: 15px; }
    .brand .tagline {
      font-family: var(--mono); font-weight: 400; font-size: 10px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--mute); padding: 2px 6px;
      border: var(--bw) solid var(--edge-soft);
    }
    .grow { flex: 1; }
    .gauge {
      font-family: var(--mono); font-size: 11px; display: inline-flex; align-items: center; gap: 6px;
      color: var(--ink-2); white-space: nowrap; border: var(--bw) solid var(--edge-soft); padding: 5px 9px;
    }
    .gauge .g-crit { color: var(--mute); }
    .gauge.hot { border-color: var(--crit); }
    .gauge.hot .g-crit { color: var(--crit); font-weight: 700; }
    .gauge .g-sep { color: var(--edge-soft); }
    .pill {
      font-family: var(--mono); font-size: 11px; padding: 5px 10px; text-transform: lowercase;
      border: var(--bw) solid var(--edge-soft); color: var(--ink-2);
      display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .pill .dot { width: 9px; height: 9px; background: var(--mute); border: var(--bw) solid var(--edge); }
    .pill.live { border-color: var(--accent); color: var(--accent); }
    .pill.live .dot { background: var(--accent); border-color: var(--accent); }
    .pill.mock .dot { background: var(--high); border-color: var(--high); }
    .theme-toggle {
      font: inherit; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
      background: var(--surface-2); color: var(--ink); border: var(--bw2) solid var(--edge);
      padding: 6px 11px; box-shadow: 3px 3px 0 var(--shadow);
      transition: transform .12s, box-shadow .12s;
    }
    .theme-toggle:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--shadow); }
    .theme-toggle:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--shadow); }
    .theme-toggle .tt-icon { font-size: 13px; }

    /* ---- Cockpit: three persistent panes ---- */
    .cockpit {
      flex: 1 1 auto; min-height: 0; display: grid;
      grid-template-columns: minmax(300px,340px) minmax(0,1fr) minmax(330px,400px);
    }
    .pane {
      min-width: 0; min-height: 0; display: flex; flex-direction: column;
      background: var(--bg); border-right: var(--bw2) solid var(--edge);
    }
    .pane-center { background: var(--surface); }
    .pane-right { border-right: 0; }
    .pane-scroll {
      flex: 1 1 auto; overflow-y: auto; min-height: 0; padding: var(--s4);
      scrollbar-width: none;        /* Firefox */
      -ms-overflow-style: none;     /* legacy Edge */
    }
    .pane-scroll::-webkit-scrollbar { width: 0; height: 0; }  /* Chrome/Safari */
    .pane-head {
      display: flex; align-items: center; gap: var(--s2); margin-bottom: var(--s4);
    }
    .pane-title {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      font-weight: 700; color: var(--mute);
    }
    .placeholder { color: var(--mute); text-align: center; padding: var(--s8) 0; font-size: 13px; }

    /* ---- Filters ---- */
    .filters {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--s2);
      margin-bottom: var(--s4); padding-bottom: var(--s4);
      border-bottom: var(--bw2) solid var(--edge);
    }
    .filter-group {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--mute);
    }
    .filter-group select,
    .search-group input {
      color: var(--ink); background: var(--field);
      border: var(--bw2) solid var(--edge); border-radius: 0;
      padding: 7px 10px; font: inherit;
    }
    .filter-group select { cursor: pointer; font-size: 12px; text-transform: none; letter-spacing: 0; }
    .search-group { flex: 1 1 100%; }
    .search-group input { width: 100%; }
    .search-group input::placeholder { color: var(--mute); }
    .clear-btn {
      font: inherit; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--ink); background: var(--surface-2); border: var(--bw2) solid var(--edge);
      padding: 6px 12px; cursor: pointer; box-shadow: 3px 3px 0 var(--shadow);
      transition: transform .12s, box-shadow .12s;
    }
    .clear-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--shadow); }
    .clear-btn:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--shadow); }

    /* ---- Queue ---- */
    .queue { display: flex; flex-direction: column; gap: var(--s3); }
    .card {
      position: relative; cursor: pointer; width: 100%; text-align: left;
      background: var(--surface); border: var(--bw2) solid var(--edge);
      border-left-width: 7px; border-left-color: var(--edge);
      padding: var(--s3) var(--s3) var(--s3) var(--s4);
      display: flex; align-items: center; gap: var(--s3);
      box-shadow: 4px 4px 0 var(--shadow);
      transition: transform .12s, box-shadow .12s;
    }
    .card:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--shadow); }
    .card:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--shadow); }
    .card.p-critical { border-left-color: var(--crit); }
    .card.p-high     { border-left-color: var(--high); }
    .card.p-normal   { border-left-color: var(--norm); }
    .card.p-low      { border-left-color: var(--low); }
    .card.p-untriaged{ border-left-color: var(--edge-soft); }
    /* SIGNATURE: the selected card pops a cyan hard-shadow toward the workspace */
    .card.active { border-color: var(--accent); box-shadow: 6px 6px 0 var(--accent); transform: translate(-2px,-2px); }
    .card .body { flex: 1; min-width: 0; }
    .card .title {
      font-size: 14px; font-weight: 800; color: var(--ink); margin: 0 0 6px; letter-spacing: -0.01em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .card .meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 10px; color: var(--mute);
    }
    .card .meta .id { color: var(--ink-2); }
    .card.resolved { opacity: 0.6; }
    .card.resolved .title { text-decoration: line-through; }

    /* source tag */
    .source {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 2px 6px; border: var(--bw) solid var(--edge-soft); color: var(--ink-2); white-space: nowrap;
    }
    .source.s-github { color: var(--ink); }
    .source.s-slack  { color: var(--norm); border-color: var(--norm); }
    .source.s-email  { color: var(--accent); border-color: var(--accent); }

    /* priority chip — flat heat block, filled for critical */
    .badge {
      flex-shrink: 0; font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 9px;
      border: var(--bw) solid var(--edge); color: var(--ink); white-space: nowrap;
    }
    .badge.p-critical { color: var(--crit-ink); background: var(--crit); border-color: var(--crit); }
    .badge.p-high     { color: var(--high-ink); background: var(--high); border-color: var(--high); }
    .badge.p-normal   { color: var(--norm-ink); background: var(--norm); border-color: var(--norm); }
    .badge.p-low      { color: var(--low); background: transparent; border-color: var(--low); }
    .badge.p-untriaged{ color: var(--mute); border-style: dashed; }

    /* AI triage rationale — the judgment behind the priority */
    .triage-reason {
      display: flex; align-items: baseline; gap: var(--s3); margin: 0 0 var(--s5);
      padding: var(--s3); background: var(--surface-2);
      border: var(--bw2) solid var(--edge); border-left-width: 7px;
    }
    .triage-reason-label {
      flex-shrink: 0; font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase; color: var(--mute);
    }
    .triage-reason-text { color: var(--ink-2); font-size: 14px; line-height: 1.5; }
    .triage-reason.p-critical { border-left-color: var(--crit); }
    .triage-reason.p-critical .triage-reason-label { color: var(--crit); }
    .triage-reason.p-high     { border-left-color: var(--high); }
    .triage-reason.p-high     .triage-reason-label { color: var(--high); }
    .triage-reason.p-normal   { border-left-color: var(--norm); }
    .triage-reason.p-low      { border-left-color: var(--low); }

    .related-badge {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.03em;
      padding: 2px 6px; border: var(--bw) solid var(--accent); color: var(--accent); white-space: nowrap;
    }

    /* lifecycle status pill */
    .status-pill {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 2px 6px; border: var(--bw) solid var(--edge-soft); color: var(--mute); white-space: nowrap;
    }
    .status-pill.st-triaged { color: var(--ink-2); }
    .status-pill.st-investigating { color: var(--high); border-color: var(--high); }
    .status-pill.st-resolved { color: var(--accent); border-color: var(--accent); }

    /* ---- Workspace (center + right panes) ---- */
    .back-btn {
      font: inherit; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--ink); background: var(--surface-2); border: var(--bw2) solid var(--edge);
      padding: 6px 11px; cursor: pointer; display: none; align-items: center;
      box-shadow: 3px 3px 0 var(--shadow); transition: transform .12s, box-shadow .12s;
    }
    .back-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--shadow); }
    .detail-actions { margin: 0 0 var(--s4); }
    .investigate-btn {
      font: inherit; font-family: var(--mono); font-weight: 700; font-size: 12px;
      letter-spacing: 0.08em; text-transform: uppercase; width: 100%;
      color: var(--crit-ink); background: var(--crit); border: var(--bw2) solid var(--edge);
      padding: 11px 16px; cursor: pointer; box-shadow: 4px 4px 0 var(--shadow);
      transition: transform .12s, box-shadow .12s;
    }
    .investigate-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--shadow); }
    .investigate-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--shadow); }
    .investigate-btn[disabled] { cursor: default; background: var(--high); color: var(--high-ink); transform: none; }

    /* investigation status — animated plan tree (inspiration: ui_plan/1.txt) */
    .investigation-status {
      border: var(--bw2) solid var(--edge); background: var(--surface-2);
      padding: var(--s4); margin-bottom: var(--s4); box-shadow: 4px 4px 0 var(--shadow);
    }
    .investigation-status.error { border-color: var(--crit); }
    .investigation-status .status-title {
      margin: 0 0 var(--s4); font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
      text-transform: uppercase; font-weight: 700; color: var(--accent);
    }
    .investigation-status.error .status-title { color: var(--crit); }
    .investigation-steps { position: relative; display: grid; gap: var(--s3); margin: 0; padding: 0; list-style: none; }
    .investigation-steps::before {
      content: ""; position: absolute; left: 6px; top: 10px; bottom: 10px; width: 2px; background: var(--edge-soft);
    }
    .investigation-step { position: relative; display: flex; gap: var(--s3); align-items: flex-start; color: var(--ink-2); font-size: 13px; line-height: 1.4; }
    .step-dot { flex: 0 0 auto; width: 14px; height: 14px; background: var(--field); border: var(--bw) solid var(--edge); margin-top: 1px; z-index: 1; }
    .investigation-step.done .step-dot { background: var(--add); border-color: var(--add); }
    .investigation-step.active .step-dot { background: var(--accent); border-color: var(--accent); animation: beat 1.1s ease-in-out infinite; }
    .investigation-step.pending { color: var(--mute); }
    @keyframes beat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.35); } }

    .hypothesis-card { border: var(--bw2) solid var(--high); background: var(--surface-2); padding: var(--s4); box-shadow: 4px 4px 0 var(--shadow); }
    .hypothesis-card p { margin: 0; color: var(--ink); font-size: 14px; line-height: 1.6; }
    .verified-pill {
      font-family: var(--mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase;
      color: var(--add); border: var(--bw) solid var(--add); padding: 2px 7px; margin-left: 8px; vertical-align: middle;
    }
    .fix-card { border: var(--bw2) solid var(--edge); background: var(--surface-2); box-shadow: 4px 4px 0 var(--shadow); }
    .fix-head { display: flex; align-items: center; gap: var(--s2); border-bottom: var(--bw) solid var(--edge); background: var(--surface-3); padding-right: 8px; }
    .code-citation {
      position: relative; flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-family: var(--mono); font-size: 12px; padding: 9px 11px; color: var(--accent); text-decoration: none;
    }
    /* underline-reveal on links (inspiration: ui_plan/3.txt) */
    .code-citation::after { content: ""; position: absolute; left: 11px; bottom: 5px; height: 2px; width: calc(100% - 22px); background: currentColor; transform: scaleX(0); transform-origin: left; transition: transform .2s; }
    .code-citation:hover::after, .code-citation:focus-visible::after { transform: scaleX(1); }
    .code-citation .cite-hint { margin-left: auto; color: var(--mute); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; }
    .copy-fix {
      flex: 0 0 auto; font: inherit; font-family: var(--mono); font-size: 11px;
      color: var(--ink); background: var(--surface); border: var(--bw) solid var(--edge);
      padding: 5px 9px; cursor: pointer; white-space: nowrap;
    }
    .copy-fix:hover { background: var(--surface-3); }
    .copy-fix.copied { color: var(--add); border-color: var(--add); }
    .diff { margin: 0; padding: 10px 0; overflow-x: auto; font-family: var(--mono); font-size: 12px; line-height: 1.55; background: var(--field); }
    .diff .dl { display: block; padding: 0 11px; white-space: pre; }
    .diff .dl.add { background: rgba(55,196,106,.16); color: var(--add); }
    .diff .dl.del { background: rgba(255,93,82,.16); color: var(--del); }
    .diff .dl.meta { color: var(--mute); }
    .fix-rationale { margin: 0; padding: 9px 11px; border-top: var(--bw) solid var(--edge); color: var(--ink-2); font-size: 13px; line-height: 1.55; }

    .evidence-grid { display: grid; gap: var(--s2); }
    .evidence-card {
      display: grid; gap: 3px; background: var(--surface-2); border: var(--bw2) solid var(--edge);
      padding: 9px 11px; color: var(--ink); text-decoration: none;
      box-shadow: 3px 3px 0 var(--shadow); transition: transform .12s, box-shadow .12s;
    }
    .evidence-card:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--shadow); }
    .evidence-card:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--shadow); }
    .evidence-type { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
    .evidence-label { color: var(--ink-2); font-size: 13px; overflow-wrap: anywhere; }

    /* center summary */
    .summary > .meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: var(--s3); }
    .summary > .meta .id { font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
    .summary h1 { font-family: var(--display); font-weight: 900; font-size: 23px; line-height: 1.15; letter-spacing: -0.02em; margin: 0 0 var(--s4); }
    .assignee-chip { font-family: var(--mono); font-size: 10px; letter-spacing: 0.03em; padding: 2px 7px; border: var(--bw) solid var(--edge-soft); color: var(--ink-2); }
    .assignee-chip.unassigned { border-style: dashed; color: var(--mute); }

    .detail-section { border-top: var(--bw) solid var(--edge-soft); padding-top: var(--s4); margin-top: var(--s5); }
    .detail-section h2 {
      margin: 0 0 var(--s3); font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
      text-transform: uppercase; font-weight: 700; color: var(--ink);
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface-3); border: var(--bw) solid var(--edge); padding: 4px 9px;
    }
    .detail-text { color: var(--ink-2); white-space: pre-wrap; overflow-wrap: anywhere; margin: 0; font-size: 14px; line-height: 1.6; }
    .detail-empty { color: var(--mute); font-size: 13px; margin: 0; font-style: italic; }
    .related-list { display: flex; flex-direction: column; gap: var(--s2); margin: 0; padding: 0; list-style: none; }
    .related-link {
      width: 100%; display: flex; align-items: center; gap: var(--s2);
      background: var(--surface-2); color: var(--ink); border: var(--bw2) solid var(--edge);
      padding: 9px 11px; cursor: pointer; text-align: left; font: inherit;
      box-shadow: 3px 3px 0 var(--shadow); transition: transform .12s, box-shadow .12s;
    }
    .related-link:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--shadow); }
    .related-link:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--shadow); }
    .related-link .rel-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; font-weight: 600; }
    .related-link .rel-id { font-family: var(--mono); font-size: 11px; color: var(--mute); white-space: nowrap; }

    /* empty workspace prompts */
    .ws-empty { height: 100%; min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--mute); gap: var(--s3); padding: var(--s8) var(--s4); }
    .ws-empty .glyph { font-size: 26px; border: var(--bw2) solid var(--edge-soft); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
    .ws-empty h2 { font-family: var(--display); font-weight: 900; font-size: 17px; color: var(--ink); margin: 0; text-transform: uppercase; letter-spacing: -0.01em; }
    .ws-empty p { margin: 0; max-width: 300px; font-size: 13px; }

    /* ---- Loading skeletons ---- */
    .skeleton {
      position: relative; background: var(--surface); border: var(--bw2) solid var(--edge);
      border-left-width: 7px; padding: var(--s3) var(--s4);
      display: flex; align-items: center; gap: var(--s3); box-shadow: 4px 4px 0 var(--shadow);
    }
    .skeleton .sk-body { flex: 1; }
    .sk-line { height: 12px; background: var(--surface-3); position: relative; overflow: hidden; }
    .sk-line.lg { width: 60%; height: 15px; margin-bottom: 9px; }
    .sk-line.sm { width: 30%; }
    .sk-pill { width: 64px; height: 24px; background: var(--surface-3); position: relative; overflow: hidden; }
    .sk-line::after, .sk-pill::after {
      content: ""; position: absolute; inset: 0; transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(0,205,190,0.18), transparent);
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }

    /* ---- Empty / error states ---- */
    .state { text-align: center; padding: var(--s8) var(--s4); color: var(--ink-2); }
    .state .glyph { font-size: 28px; line-height: 1; margin-bottom: var(--s3); color: var(--mute); }
    .state h2 { font-family: var(--display); font-size: 17px; font-weight: 900; color: var(--ink); margin: 0 0 var(--s2); text-transform: uppercase; letter-spacing: -0.01em; }
    .state p { margin: 0 auto; max-width: 360px; font-size: 13px; color: var(--mute); }
    .state.error .glyph { color: var(--crit); }
    .state code { font-family: var(--mono); color: var(--ink-2); font-size: 12px; }
    .state button {
      margin-top: var(--s4); font: inherit; font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700;
      color: var(--crit-ink); background: var(--crit); border: var(--bw2) solid var(--edge);
      padding: 9px 18px; cursor: pointer; box-shadow: 4px 4px 0 var(--shadow);
    }
    .state button:hover { transform: translate(-1px,-1px); }

    /* ---- Source / account switcher — segmented tabs (inspiration: ui_plan/4.txt) ---- */
    .switcher { display: flex; flex-wrap: wrap; align-items: center; gap: var(--s2); margin-bottom: var(--s3); }
    .src-tabs { display: inline-flex; border: var(--bw2) solid var(--edge); background: var(--field); }
    .src-tab {
      font: inherit; font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
      color: var(--ink-2); background: transparent; border: 0; border-right: var(--bw) solid var(--edge-soft);
      padding: 6px 11px; cursor: pointer; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .src-tab:last-child { border-right: 0; }
    .src-tab:hover { color: var(--ink); }
    .src-tab.active { background: var(--ink); color: var(--bg); }
    .src-tab .tab-count { font-size: 10px; opacity: 0.7; }
    .switcher-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mute); }
    .account-select {
      color: var(--ink); background: var(--field); border: var(--bw2) solid var(--edge);
      padding: 6px 10px; font: inherit; font-family: var(--mono); font-size: 11px; cursor: pointer;
    }
    .acct { font-family: var(--mono); font-size: 10px; color: var(--mute); }

    /* ---- Human override controls — three-dot menu ---- */
    .detail-menu-wrap { position: relative; margin-left: auto; z-index: 6; }
    .kebab {
      font: inherit; font-size: 18px; line-height: 1; color: var(--ink);
      background: var(--surface-2); border: var(--bw2) solid var(--edge);
      width: 34px; height: 34px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 3px 3px 0 var(--shadow);
    }
    .kebab:hover, .kebab[aria-expanded="true"] { background: var(--surface-3); }
    .override-menu {
      position: absolute; top: 42px; right: 0; width: 260px;
      background: var(--surface); border: var(--bw2) solid var(--edge);
      box-shadow: 6px 6px 0 var(--shadow); padding: var(--s4); display: grid; gap: var(--s3);
    }
    .override-menu h3 { margin: 0; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
    .ov-row { display: grid; gap: 6px; }
    .ov-row > .ov-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mute); }
    .ov-row select, .ov-row input[type="text"] {
      width: 100%; color: var(--ink); background: var(--field); border: var(--bw2) solid var(--edge);
      padding: 7px 9px; font: inherit; font-size: 13px;
    }
    .ov-assign { display: flex; gap: 6px; }
    .ov-assign input { flex: 1; min-width: 0; }
    .ov-assign button {
      font: inherit; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      color: var(--accent-ink); background: var(--accent); border: var(--bw2) solid var(--edge);
      padding: 0 12px; cursor: pointer; white-space: nowrap;
    }

    /* ---- Audit timeline ---- */
    .timeline { list-style: none; margin: 0; padding: 0; display: grid; position: relative; }
    .tl-item { position: relative; padding: 3px 0 12px 26px; }
    .tl-item:last-child { padding-bottom: 2px; }
    .tl-item:not(:last-child)::before {
      content: ""; position: absolute; left: 6px; top: 20px; bottom: -8px;
      width: 2px; background: var(--edge-soft);
    }
    .tl-dot { position: absolute; z-index: 1; left: 0; top: 6px; width: 14px; height: 14px; background: var(--field); border: var(--bw) solid var(--edge); }
    .tl-item.actor-system .tl-dot { background: var(--mute); }
    .tl-item.actor-ai .tl-dot { background: var(--ai); border-color: var(--ai); }
    .tl-item.actor-operator .tl-dot { background: var(--accent); border-color: var(--accent); }
    .tl-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .tl-time { font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
    .tl-actor { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 6px; border: var(--bw) solid var(--edge-soft); color: var(--mute); }
    .tl-item.actor-ai .tl-actor { color: var(--ai); border-color: var(--ai); }
    .tl-item.actor-operator .tl-actor { color: var(--accent); border-color: var(--accent); }
    .tl-summary { color: var(--ink); font-size: 13px; margin-top: 2px; }
    .tl-detail { color: var(--mute); font-size: 11px; font-family: var(--mono); margin-top: 2px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
      .card:hover, .related-link:hover, .evidence-card:hover, .investigate-btn:hover,
      .clear-btn:hover, .theme-toggle:hover { transform: none; }
    }
    /* ---- Responsive: collapse 3-pane into the queue→detail flow ---- */
    @media (max-width: 1099px) {
      body { height: auto; min-height: 100dvh; overflow: auto; }
      .cockpit { display: block; }
      .pane { border-right: 0; border-bottom: var(--bw2) solid var(--edge); }
      .pane-right { border-bottom: 0; }
      .pane-scroll { overflow: visible; }
      .cockpit[data-view="queue"] .pane-center,
      .cockpit[data-view="queue"] .pane-right { display: none; }
      .cockpit[data-view="detail"] .pane-queue { display: none; }
      .back-btn { display: inline-flex; }
    }
    @media (max-width: 560px) {
      .topbar { gap: var(--s2); padding: 8px var(--s3); }
      .brand .tagline { display: none; }
      .summary h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="brand"><span class="spark">◆</span>Forge<span class="tagline">triage cockpit</span></span>
    <span class="grow"></span>
    <span id="furnace-gauge" class="gauge" aria-live="polite"></span>
    <span id="source-pill" class="pill"><span class="dot"></span><span id="source-label">connecting…</span></span>
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch between light and dark theme" aria-pressed="false">
      <span class="tt-icon">☾</span><span class="tt-label">Dark</span>
    </button>
  </header>

  <main class="cockpit" data-view="queue">
    <section class="pane pane-queue" aria-label="Issue queue">
      <div id="pane-queue" class="pane-scroll"><div class="placeholder">Loading…</div></div>
    </section>
    <section class="pane pane-center" aria-label="Selected issue summary">
      <div id="pane-center" class="pane-scroll"></div>
    </section>
    <section class="pane pane-right" aria-label="Investigation and evidence">
      <div id="pane-right" class="pane-scroll"></div>
    </section>
  </main>

  <script>
    /* ----------------------------------------------------------------
       Lemma SDK boot.
       The pod host injects window.__LEMMA_CONFIG__ (podId, apiUrl, authUrl)
       at serve time and the SDK is loaded from cfg.apiUrl. When the page is
       served standalone for local development (Day 1, mock data), neither is
       present — we degrade to "mock" mode and read seed/issues.json so the
       queue still renders. The data seam lives in DataSource.listIssues().
    ---------------------------------------------------------------- */
    /* Embedded sample queue — the safety net. Used only when we're NOT live
       (not signed in, or the pod is unreachable). The deployed app is a single
       file with no seed/ sibling, so a relative fetch can't be the fallback;
       this inline curated set (a slice of seed/issues.json, same contract §1
       shape) guarantees the console always renders something real-looking. */
    const SAMPLE_ISSUES = [
      { id: "gh_142", source: "github", external_id: "142", priority: "critical", status: "triaged",
        source_account: "cli/cli", assignee: "alex", created_at: "2026-06-27T10:02:00Z",
        related_ids: ["iss_003"], linked_prs: [],
        title: "Panic on `gh pr create` when repo has no upstream remote",
        body: "Running `gh pr create` in a freshly cloned fork with no `upstream` configured crashes with a nil pointer dereference instead of a helpful error.\n\npanic: runtime error: invalid memory address or nil pointer dereference",
        repro_steps: "- Fork a repo and clone your fork\n- Do NOT add an `upstream` remote\n- Run `gh pr create`\n- Observe the panic",
        triage_reason: "A nil-pointer panic on a common `gh pr create` path crashes the CLI outright with no workaround, so it blocks core daily use." },
      { id: "iss_003", source: "slack", external_id: null, priority: "high", status: "triaged",
        source_account: "#eng-help", created_at: "2026-06-27T09:48:00Z",
        related_ids: ["gh_142"], linked_prs: [],
        title: "gh pr create just crashes if origin isn't set up right",
        body: "from #eng-help: \"hey is anyone else seeing `gh pr create` straight up crash? it dies with some go panic about a nil pointer. no upstream remote on my side.\"",
        repro_steps: "- Clone a fork without an upstream remote\n- Run `gh pr create`\n- Crash instead of a guided prompt" },
      { id: "gh_158", source: "github", external_id: "158", priority: "critical", status: "investigating",
        source_account: "cli/cli", assignee: "sam", created_at: "2026-06-27T10:05:00Z",
        related_ids: ["iss_007"], linked_prs: [],
        title: "Auth token not refreshed — 401 after SSO session expiry",
        body: "After my org's SSO session expires (~8h), every `gh` command returns `HTTP 401: Bad credentials`. The stored token is never refreshed and there is no prompt to re-authenticate.",
        repro_steps: "- `gh auth login` with an SSO-enforced org\n- Wait ~8 hours for the session to expire\n- Run any command\n- Persistent `HTTP 401: Bad credentials`",
        triage_reason: "Every command fails for SSO-org users once the session expires, with no auto-refresh — a broad, recurring blocker for enterprise users." },
      { id: "iss_007", source: "email", external_id: null, priority: "high", status: "triaged",
        source_account: "support@", created_at: "2026-06-27T09:30:00Z",
        related_ids: ["gh_158"], linked_prs: [],
        title: "Getting 401 errors after being logged in for a few hours",
        body: "Forwarded from support@: \"I log in fine in the morning but by mid-afternoon every command fails with a 401. Logging in again fixes it. We use Okta SSO.\"",
        repro_steps: "- Authenticate in the morning via Okta SSO\n- Use the CLI normally\n- Commands fail with 401 until re-login" },
      { id: "gh_175", source: "github", external_id: "175", priority: "critical", status: "triaged",
        source_account: "cli/cli", created_at: "2026-06-27T08:15:00Z",
        related_ids: [], linked_prs: [],
        title: "Data loss: `gh gist edit` silently truncates files larger than 1MB",
        body: "Editing a gist whose file is >1MB through `gh gist edit` saves a truncated version, silently discarding everything past ~1MB. No warning.",
        repro_steps: "- Create a gist with a file >1MB\n- `gh gist edit <id>` and save\n- The remote file is truncated to ~1MB",
        triage_reason: "Silent data loss past ~1MB with no warning is the worst failure class — users lose content without knowing." },
      { id: "gh_171", source: "github", external_id: "171", priority: "high", status: "triaged",
        source_account: "cli/cli", created_at: "2026-06-26T16:40:00Z",
        related_ids: ["iss_011"], linked_prs: [],
        title: "`gh repo clone` hangs indefinitely on large repos behind a corporate proxy",
        body: "Cloning a >1GB repo through our corporate HTTPS proxy hangs forever — no progress, no timeout. Plain `git clone` works. Looks like the CLI isn't honoring `HTTPS_PROXY`.",
        repro_steps: "- Set `HTTPS_PROXY` to a corporate proxy\n- `gh repo clone owner/large-repo`\n- Hangs with no output" },
      { id: "iss_011", source: "slack", external_id: null, priority: "normal", status: "triaged",
        source_account: "#it-support", created_at: "2026-06-26T16:20:00Z",
        related_ids: ["gh_171"], linked_prs: [],
        title: "clone freezes forever on the corp proxy",
        body: "from #it-support: \"anyone got `gh repo clone` working on the VPN/proxy? mine just freezes, no error, no progress bar. regular git clone is fine.\"",
        repro_steps: "- On corporate VPN/proxy\n- `gh repo clone` a moderately large repo\n- Hangs with no feedback" },
      { id: "gh_180", source: "github", external_id: "180", priority: "low", status: "triaged",
        source_account: "cli/cli", created_at: "2026-06-25T11:00:00Z",
        related_ids: [], linked_prs: [],
        title: "Autocompletion script for zsh emits a deprecation warning on macOS",
        body: "`eval \"$(gh completion -s zsh)\"` prints `compdef: function definition file not found` warnings on macOS 14. Functional but noisy.",
        repro_steps: "- macOS 14, default zsh\n- Add the completion eval to `.zshrc`\n- Open a new shell — warning prints" }
    ];

    // Backup take (EOD-D4 checkpoint). A real, previously-confirmed live run of the
    // `investigate` workflow over the two demo-anchor bugs, captured by
    // scripts/smoke_investigate.py --refresh-samples (mirrored in
    // seed/investigate_samples.json). Embedded so the deployed app — and the
    // on-camera demo — always shows a real cited hypothesis even when the live
    // backend is too slow on the day (EXECUTION.md D4 box 6 documents the latency).
    const INVESTIGATE_SAMPLES = {
      gh_142: {
        hypothesis: "The crash originates in `getRemotes` at `pkg/cmd/pr/create/create.go:1023`: when `gh pr create` is run in a freshly cloned fork with no `upstream` remote configured (and no `--repo` override), `opts.Remotes()` either returns an error that the function swallows because it is not unconditionally re-thrown, or returns a nil/empty `remotes` value with `err == nil`. In both paths the function returns `(remotes, nil)` — a nil/empty slice with no error — so the caller (the `Browser`/`BaseRef` resolution that asks for an \"upstream\" remote) dereferences a nil remote and produces the `runtime error: invalid memory address or nil pointer dereference` recorded in the trace at `pkg/cmd/pr/create.getRemotes(...)`. The Slack issue `iss_003` (\"gh pr create just crashes if origin isn't set up right\") reports the same crash in essentially the same scenario and is linked from gh_142, reinforcing that the failure mode is a missing empty/nil-remote guard in `getRemotes` rather than anything specific to a single user's git config.",
        evidence: [
          { type: "file", label: "pkg/cmd/pr/create/create.go:1023 — getRemotes()",
            url: "https://github.com/cli/cli/blob/954ffc37e5931a9621868a50f05c8fb17e288f19/pkg/cmd/pr/create/create.go#L1023-L1034" },
          { type: "issue", label: "gh pr create just crashes if origin isn't set up right (slack)",
            url: "https://lemma.work/pod/019f01ec-5992-732f-b395-a2b29fc87254/files?file=/issues/iss_003.md" },
          { type: "file", label: "Original report — Panic on `gh pr create` when repo has no upstream remote",
            url: "https://lemma.work/pod/019f01ec-5992-732f-b395-a2b29fc87254/files?file=/issues/gh_142.md" }
        ],
        proposed_fix: {
          file_path: "pkg/cmd/pr/create/create.go",
          url: "https://github.com/cli/cli/blob/954ffc37e5931a9621868a50f05c8fb17e288f19/pkg/cmd/pr/create/create.go#L1023-L1034",
          line_start: 1023, line_end: 1034,
          diff: "--- a/pkg/cmd/pr/create/create.go\n+++ b/pkg/cmd/pr/create/create.go\n@@ -1023,12 +1023,15 @@\n func getRemotes(opts *CreateOptions) (ghContext.Remotes, error) {\n \t// TODO: consider obtaining remotes from GitClient instead\n \tremotes, err := opts.Remotes()\n \tif err != nil {\n \t\t// When a repo override value is given, ignore errors when fetching git remotes\n \t\t// to support using this command outside of git repos.\n \t\tif opts.RepoOverride == \"\" {\n \t\t\treturn nil, err\n \t\t}\n \t}\n+\tif len(remotes) == 0 {\n+\t\treturn nil, errors.New(\"no git remotes found; configure `origin` and `upstream`, or pass --repo\")\n+\t}\n \treturn remotes, nil\n }",
          rationale: "Returning a clear error from `getRemotes` when no remotes are present prevents the caller from dereferencing a nil/empty remotes slice — the exact path the panic trace points at — and gives the user an actionable message instead of a stack trace."
        }
      },
      gh_158: {
        hypothesis: "The root cause lives in the CLI's auth/token-refresh path: when an SSO-enforced org invalidates a stored token after the ~8-hour session window, the auth subsystem does not treat the resulting `HTTP 401: Bad credentials` as a refresh trigger and surfaces the error instead of calling `gh auth refresh` (or prompting the user to do so). The user is therefore forced to re-run `gh auth login` manually. The same behavior was reported previously as iss_007 (401 errors after being logged in for a few hours with SSO), which the issue record explicitly lists under `related_ids`, and a separate report (cli/cli#13709) indicates `gh auth refresh` itself is unreliable — together these point to the refresh-on-401 logic in the auth package (likely around the request middleware or token store that wraps API calls) as the component that fails to re-establish SSO-scoped credentials. The provided commit evidence matched on keywords only (coding-agent detection, AGENTS.md guidance, dev-tunnels bump) and does not bear on refresh behavior, so it is not cited.",
        evidence: [
          { type: "file", label: "Original report — Auth token not refreshed — 401 after SSO session expiry",
            url: "https://lemma.work/pod/019f01ec-5992-732f-b395-a2b29fc87254/files?file=/issues/gh_158.md" },
          { type: "issue", label: "Getting 401 errors after being logged in for a few hours (email)",
            url: "https://lemma.work/pod/019f01ec-5992-732f-b395-a2b29fc87254/files?file=/issues/iss_007.md" },
          { type: "issue", label: "`gh auth refresh --remove-scopes gist` has no effect (github)",
            url: "https://github.com/cli/cli/issues/13709" }
        ]
      }
    };

    const DataSource = {
      mode: "mock",          // "live" (pod), "seed" (local file), or "sample" (embedded)
      client: null,
      user: null,
      async init() {
        const cfg = window.__LEMMA_CONFIG__;
        if (cfg && window.LemmaClient) {
          // One retry: the pod backend can 503/timeout transiently on first hit.
          for (let attempt = 0; attempt < 2 && this.mode !== "live"; attempt++) {
            try {
              this.client = this.client || new window.LemmaClient.LemmaClient();
              const state = await this.client.initialize();   // { status, user }
              if (state && state.status === "authenticated") {
                this.mode = "live";
                this.user = state.user || null;
              }
            } catch (err) {
              console.warn("Lemma init attempt " + (attempt + 1) + " failed:", err);
            }
          }
        }
        return this.mode;
      },

      /* The data seam. Live reads the real `issues` Table; otherwise we try a
         local seed file (dev convenience) and finally the embedded sample —
         so the deployed app NEVER dead-ends on a missing seed file. */
      async listIssues() {
        if (this.mode === "live") {
          const res = await this.client.records.list("issues", { limit: 100 });
          const items = (res && res.items) || res || [];
          // Records come back as flat row objects (contract §1 fields at top
          // level). Unwrap defensively in case a row is delivered as {payload}.
          return items.map(function (r) {
            return r && r.payload && r.title === undefined
              ? Object.assign({ id: r.id }, r.payload)
              : r;
          });
        }
        try {
          const res = await fetch("../seed/issues.json", { cache: "no-store" });
          if (res.ok) { this.mode = "seed"; return await res.json(); }
        } catch (err) { /* no local seed (e.g. deployed) — use embedded sample */ }
        this.mode = "sample";
        return SAMPLE_ISSUES;
      },

      // Run the `investigate` workflow and return its result in the contract §5
      // shape the detail view renders: { hypothesis, evidence:[{type,label,url}] }.
      // Live mode drives the real workflow (create run -> submit the `intake` form
      // -> poll for the `synthesize` node output). If the live backend is too slow
      // or a node fails (EXECUTION.md D4 box 6), we fall back to the embedded backup
      // take so a real cited hypothesis still shows. Mock/seed/sample modes use the
      // backup take when available, else a conservative placeholder.
      async triggerInvestigation(issue) {
        if (this.mode === "live" && this.client && this.client.workflows) {
          try {
            const result = await this._runInvestigateLive(issue);
            if (result && result.hypothesis) return result;
          } catch (err) { /* fall through to backup take */ }
          const backup = INVESTIGATE_SAMPLES[issue.id];
          if (backup) return { mode: "backup", run_id: null, hypothesis: backup.hypothesis, evidence: backup.evidence, proposed_fix: backup.proposed_fix || null };
          return { mode: "live", run_id: null, hypothesis: "", evidence: [], proposed_fix: null };
        }
        const sample = INVESTIGATE_SAMPLES[issue.id];
        if (sample) return { mode: "sample", run_id: "sample-" + issue.id, hypothesis: sample.hypothesis, evidence: sample.evidence, proposed_fix: sample.proposed_fix || null };
        return { mode: "mock", run_id: "mock-" + issue.id, hypothesis: mockHypothesisForIssue(issue), evidence: mockEvidenceForIssue(issue), proposed_fix: null };
      },

      async _runInvestigateLive(issue, timeoutMs = 30000, pollMs = 3000) {
        const wf = this.client.workflows;
        const createRun = wf.createRun || wf.create_run;
        const submitForm = wf.submitForm || wf.submit_form;
        const runGet = wf.runGet || wf.run_get || wf.getRun || wf.get;
        if (!createRun || !submitForm) return null;
        const run = await createRun.call(wf, "investigate");
        const runId = run && (run.id || run.run_id);
        // The form node is `intake` (input_schema { issue_id }), not "issue_form".
        try { await submitForm.call(wf, runId, "intake", { issue_id: issue.id }); }
        catch (err) { await submitForm.call(wf, runId, { issue_id: issue.id }); }
        const deadline = Date.now() + timeoutMs;
        const TERMINAL = { COMPLETED: 1, FAILED: 1, CANCELLED: 1, ERROR: 1 };
        while (runGet && Date.now() < deadline) {
          await new Promise(function (r) { setTimeout(r, pollMs); });
          let cur;
          try { cur = await runGet.call(wf, runId); } catch (err) { continue; }
          if (cur && TERMINAL[cur.status]) {
            const synth = (cur.execution_context || {}).synthesize || {};
            return { mode: "live", run_id: runId, hypothesis: synth.hypothesis || "", evidence: synth.evidence || [], proposed_fix: synth.proposed_fix || null };
          }
        }
        return { mode: "live", run_id: runId, hypothesis: "", evidence: [], proposed_fix: null };
      },

      // Write an issue's lifecycle status. Live mode goes through the granted
      // `set_status` Function (the only writer); other modes just succeed so the
      // UI updates its in-memory copy. Returns true on a confirmed write.
      async setStatus(issueId, status) {
        if (this.mode === "live" && this.client && this.client.functions) {
          // Browser SDK: functions.run(name, { input }) -> { input_data } on the wire.
          const res = await this.client.functions.run("set_status", { input: { issue_id: issueId, status: status } });
          const out = (res && (res.output_data || res.output || res.result)) || res || {};
          return out.ok !== false;
        }
        return true;  // mock/seed/sample — optimistic local update
      },

      // Operator override: priority. Live mode goes through the granted
      // `set_priority` Function (validates + logs a priority_changed event).
      async setPriority(issueId, priority) {
        if (this.mode === "live" && this.client && this.client.functions) {
          const res = await this.client.functions.run("set_priority", { input: { issue_id: issueId, priority: priority } });
          const out = (res && (res.output_data || res.output || res.result)) || res || {};
          return out.ok !== false;
        }
        return true;
      },

      // Operator override: assignee (empty string clears to Unassigned). Live mode
      // goes through the granted `set_assignee` Function (logs an assignee_changed event).
      async setAssignee(issueId, assignee) {
        if (this.mode === "live" && this.client && this.client.functions) {
          const res = await this.client.functions.run("set_assignee", { input: { issue_id: issueId, assignee: assignee || "" } });
          const out = (res && (res.output_data || res.output || res.result)) || res || {};
          return out.ok !== false;
        }
        return true;
      },

      // Read the audit/evidence trail for one issue. Live mode lists the `events`
      // Table and filters to this issue (sorted by `ts`); returns null in other
      // modes (or when the live table has no rows yet) so the caller synthesizes
      // the trail from the issue's own fields — the timeline always renders.
      async listEvents(issueId) {
        if (this.mode === "live" && this.client && this.client.records) {
          try {
            const res = await this.client.records.list("events", { limit: 500 });
            const items = (res && res.items) || res || [];
            const rows = items.map(function (r) {
              return r && r.payload && r.kind === undefined
                ? Object.assign({ id: r.id }, r.payload) : r;
            }).filter(function (e) { return e && e.issue_id === issueId; });
            if (!rows.length) return null;
            rows.sort(function (a, b) { return String(a.ts || a.created_at || "").localeCompare(String(b.ts || b.created_at || "")); });
            return rows;
          } catch (err) { return null; }
        }
        return null;
      },
    };

    function escapeHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function safeUrl(url) {
      const value = String(url || "");
      if (/^(https?:\/\/|\/|#)/.test(value)) return value;
      return "#";
    }

    // Critical-first ordering. Lower rank = higher up the queue; untriaged sinks
    // to the bottom. Ties broken by most-recently-updated.
    const PRIORITY_RANK = { critical: 0, high: 1, normal: 2, low: 3 };
    const AppState = {
      issues: [],
      selectedId: null,
      filters: { priority: "all", source: "all", account: "all", text: "" },
      investigations: {},
      events: {},        // issueId -> [event] (live-fetched or synthesized; operator edits appended)
      menuOpen: false,   // the detail three-dot override menu
    };

    function priorityRank(p) {
      return p && p in PRIORITY_RANK ? PRIORITY_RANK[p] : 99;
    }
    function sortCriticalFirst(issues) {
      return issues.slice().sort(function (a, b) {
        const r = priorityRank(a.priority) - priorityRank(b.priority);
        if (r !== 0) return r;
        return String(b.updated_at || "").localeCompare(String(a.updated_at || ""));
      });
    }

    function applyFilters(issues) {
      const q = (AppState.filters.text || "").trim().toLowerCase();
      return issues.filter(function (issue) {
        const priority = issue.priority || "untriaged";
        const source = issue.source || "unknown";
        const account = issue.source_account || "";
        const matchesText = !q ||
          String(issue.title || "").toLowerCase().includes(q) ||
          String(issue.id || "").toLowerCase().includes(q) ||
          String(issue.body || "").toLowerCase().includes(q);
        return (AppState.filters.priority === "all" || AppState.filters.priority === priority) &&
          (AppState.filters.source === "all" || AppState.filters.source === source) &&
          (AppState.filters.account === "all" || AppState.filters.account === account) &&
          matchesText;
      });
    }

    const SOURCE_LABELS = { github: "GitHub", slack: "Slack", email: "Email" };
    function sourceBadge(source) {
      const key = SOURCE_LABELS[source] ? source : "unknown";
      const label = SOURCE_LABELS[source] || String(source || "Unknown");
      return '<span class="source s-' + escapeHtml(key) + '">' + escapeHtml(label) + "</span>";
    }

    // Lifecycle status pill: new -> triaged -> investigating -> resolved.
    const STATUS_LABELS = { new: "New", triaged: "Triaged", investigating: "Investigating", resolved: "Resolved" };
    function statusBadge(issue) {
      const key = STATUS_LABELS[issue.status] ? issue.status : "new";
      return '<span class="status-pill st-' + escapeHtml(key) + '">' +
        escapeHtml(STATUS_LABELS[key]) + "</span>";
    }

    function relatedCount(issue) {
      return Array.isArray(issue.related_ids) ? issue.related_ids.length : 0;
    }

    function relatedBadge(issue) {
      const count = relatedCount(issue);
      if (!count) return "";
      return '<span class="related-badge">' + count + " related</span>";
    }

    function issueCard(issue) {
      const key = issue.priority || "untriaged";
      const resolved = issue.status === "resolved" ? " resolved" : "";
      return (
        '<button type="button" class="card p-' + key + resolved + '" data-id="' + escapeHtml(issue.id) + '">' +
          '<div class="body">' +
            '<h3 class="title">' + escapeHtml(issue.title) + "</h3>" +
            '<div class="meta">' +
              '<span class="id">' + escapeHtml(issue.id) + "</span>" +
              sourceBadge(issue.source) +
              (issue.source_account ? '<span class="acct">' + escapeHtml(issue.source_account) + "</span>" : "") +
              statusBadge(issue) +
              relatedBadge(issue) +
            "</div>" +
          "</div>" +
          '<span class="badge p-' + key + '">' + escapeHtml(key) + "</span>" +
        "</button>"
      );
    }

    function renderQueue(issues) {
      // Builds the persistent LEFT pane once: a switcher (source tabs + account), a
      // filter bar (search/priority/clear), and the list. Switching source re-renders
      // only the switcher; typing/filtering updates only the list — so search keeps
      // focus + caret. The center/right panes are the workspace, rendered on select.
      const q = document.getElementById("pane-queue");
      q.innerHTML =
        '<div class="pane-head"><span class="pane-title">Queue</span></div>' +
        '<div id="switcher-wrap"></div>' + renderFilterBar() + '<div id="queue-list"></div>';
      updateSwitcher();
      bindFilterBar();
      updateQueueList();
      if (!AppState.selectedId) renderWorkspaceEmpty();
    }

    function updateQueueList() {
      const list = document.getElementById("queue-list");
      if (!list) return;
      const ordered = sortCriticalFirst(applyFilters(AppState.issues));
      list.innerHTML = ordered.length
        ? '<div class="queue">' + ordered.map(issueCard).join("") + "</div>"
        : '<div class="state"><div class="glyph">∅</div><h2>No matches</h2><p>Adjust the search or filters.</p></div>';
      list.querySelectorAll(".card[data-id]").forEach(function (card) {
        if (card.getAttribute("data-id") === AppState.selectedId) card.classList.add("active");
        card.addEventListener("click", function () {
          selectIssue(card.getAttribute("data-id"));
        });
      });
    }

    function selectOption(value, label, current) {
      return '<option value="' + escapeHtml(value) + '"' +
        (value === current ? " selected" : "") + ">" + escapeHtml(label) + "</option>";
    }

    // ---- Source / account switcher (multi-repo · multi-workspace · multi-mailbox) ----
    const SOURCE_SWITCHER = [
      { key: "all", label: "All" },
      { key: "github", label: "GitHub" },
      { key: "slack", label: "Slack" },
      { key: "email", label: "Email" },
    ];
    const ACCOUNT_NOUN = { github: "repo", slack: "channel", email: "mailbox", all: "source" };

    function sourceCount(source) {
      return source === "all"
        ? AppState.issues.length
        : AppState.issues.filter(function (i) { return (i.source || "unknown") === source; }).length;
    }

    // Distinct accounts (repos / channels / mailboxes) for the chosen source.
    function accountsForSource(source) {
      const seen = {};
      AppState.issues.forEach(function (i) {
        if (source !== "all" && (i.source || "unknown") !== source) return;
        if (i.source_account) seen[i.source_account] = true;
      });
      return Object.keys(seen).sort();
    }

    function renderAccountSelect() {
      const accounts = accountsForSource(AppState.filters.source);
      if (!accounts.length) return "";   // no account dimension to switch
      const cur = AppState.filters.account;
      const noun = ACCOUNT_NOUN[AppState.filters.source] || "source";
      const opts = [selectOption("all", "All " + noun + "s", cur)]
        .concat(accounts.map(function (a) { return selectOption(a, a, cur); }))
        .join("");
      return (
        '<span class="switcher-label">' + escapeHtml(noun) + "</span>" +
        '<select id="account-filter" class="account-select" aria-label="Account">' + opts + "</select>"
      );
    }

    function renderSwitcher() {
      const s = AppState.filters.source;
      const tabs = SOURCE_SWITCHER.map(function (t) {
        const active = t.key === s ? " active" : "";
        return '<button type="button" class="src-tab' + active + '" data-source="' + t.key + '" ' +
          'role="tab" aria-selected="' + (t.key === s) + '">' +
          escapeHtml(t.label) + '<span class="tab-count">' + sourceCount(t.key) + "</span></button>";
      }).join("");
      return (
        '<div class="switcher" aria-label="Source switcher">' +
          '<div class="src-tabs" role="tablist">' + tabs + "</div>" +
          renderAccountSelect() +
        "</div>"
      );
    }

    // Re-render just the switcher (active tab + account options) and (re)bind it.
    function updateSwitcher() {
      const wrap = document.getElementById("switcher-wrap");
      if (!wrap) return;
      wrap.innerHTML = renderSwitcher();
      wrap.querySelectorAll(".src-tab[data-source]").forEach(function (tab) {
        tab.addEventListener("click", function () {
          AppState.filters.source = tab.getAttribute("data-source");
          AppState.filters.account = "all";   // a source switch resets the account
          updateSwitcher();
          updateQueueList();
        });
      });
      const account = document.getElementById("account-filter");
      if (account) {
        account.addEventListener("change", function () {
          AppState.filters.account = account.value;
          updateQueueList();
        });
      }
    }

    function renderFilterBar() {
      const p = AppState.filters.priority;
      return (
        '<div class="filters" aria-label="Queue filters">' +
          '<label class="filter-group search-group">' +
            '<input type="search" id="search-filter" placeholder="Search issues…" ' +
              'value="' + escapeHtml(AppState.filters.text || "") + '" aria-label="Search issues" />' +
          "</label>" +
          '<label class="filter-group">Priority ' +
            '<select id="priority-filter">' +
              selectOption("all", "All", p) +
              selectOption("critical", "Critical", p) +
              selectOption("high", "High", p) +
              selectOption("normal", "Normal", p) +
              selectOption("low", "Low", p) +
              selectOption("untriaged", "Untriaged", p) +
            "</select>" +
          "</label>" +
          '<button type="button" class="clear-btn" id="clear-filters">Clear</button>' +
        "</div>"
      );
    }

    function bindFilterBar() {
      const priority = document.getElementById("priority-filter");
      const search = document.getElementById("search-filter");
      const clear = document.getElementById("clear-filters");
      priority.addEventListener("change", function () {
        AppState.filters.priority = priority.value;
        updateQueueList();
      });
      search.addEventListener("input", function () {
        AppState.filters.text = search.value;
        updateQueueList();
      });
      clear.addEventListener("click", function () {
        AppState.filters = { priority: "all", source: "all", account: "all", text: "" };
        priority.value = "all";
        search.value = "";
        updateSwitcher();    // reset tabs + account select
        updateQueueList();
      });
    }

    function findIssue(id) {
      return AppState.issues.find(function (issue) { return String(issue.id) === String(id); });
    }

    function renderRelatedList(issue) {
      const ids = Array.isArray(issue.related_ids) ? issue.related_ids : [];
      if (!ids.length) return '<p class="detail-empty">No confirmed related issues yet.</p>';
      return (
        '<ul class="related-list">' +
        ids.map(function (id) {
          const related = findIssue(id);
          const title = related ? related.title : "Related issue not loaded";
          return (
            '<li><button type="button" class="related-link" data-related-id="' + escapeHtml(id) + '">' +
              '<span class="rel-title">' + escapeHtml(title) + "</span>" +
              '<span class="rel-id">' + escapeHtml(id) + "</span>" +
            "</button></li>"
          );
        }).join("") +
        "</ul>"
      );
    }

    function renderInvestigationStatus(investigation) {
      if (!investigation || investigation.status === "idle") return "";
      if (investigation.status === "error") {
        return (
          '<div class="investigation-status error">' +
            '<p class="status-title">Investigation blocked</p>' +
            '<p class="detail-empty">' + escapeHtml(investigation.message || "Workflow run failed to start.") + "</p>" +
          "</div>"
        );
      }
      if (investigation.status === "complete") {
        return (
          '<div class="investigation-status">' +
            '<p class="status-title">Investigation complete</p>' +
            '<ol class="investigation-steps">' +
              '<li class="investigation-step done"><span class="step-dot"></span><span>Workflow run queued</span></li>' +
              '<li class="investigation-step done"><span class="step-dot"></span><span>Evidence gathered</span></li>' +
              '<li class="investigation-step done"><span class="step-dot"></span><span>Hypothesis synthesized</span></li>' +
            "</ol>" +
          "</div>"
        );
      }
      const phase = investigation.phase || "queued";
      const steps = [
        { key: "queued", label: "Workflow run queued" },
        { key: "evidence", label: "Gathering issue, related reports, and code evidence" },
        { key: "synthesis", label: "Synthesizing root-cause hypothesis" },
      ];
      const phaseIndex = steps.findIndex(function (step) { return step.key === phase; });
      return (
        '<div class="investigation-status" aria-live="polite">' +
          '<p class="status-title">Investigation running</p>' +
          '<ol class="investigation-steps">' +
            steps.map(function (step, idx) {
              const state = idx < phaseIndex ? "done" : (idx === phaseIndex ? "active" : "pending");
              return '<li class="investigation-step ' + state + '"><span class="step-dot"></span>' +
                '<span>' + escapeHtml(step.label) + "</span></li>";
            }).join("") +
          "</ol>" +
        "</div>"
      );
    }

    function githubIssueUrl(issue) {
      if (issue && issue.source === "github" && issue.external_id) {
        return "https://github.com/cli/cli/issues/" + encodeURIComponent(issue.external_id);
      }
      return "#" + encodeURIComponent(issue && issue.id ? issue.id : "issue");
    }

    function mockEvidenceForIssue(issue) {
      const related = (Array.isArray(issue.related_ids) ? issue.related_ids : [])
        .map(findIssue)
        .filter(Boolean)
        .slice(0, 2);
      const evidence = [
        {
          type: "issue",
          label: issue.id + ": " + issue.title,
          url: githubIssueUrl(issue),
        },
        {
          type: "file",
          label: "/issues/" + issue.id + ".md",
          url: "/issues/" + encodeURIComponent(issue.id) + ".md",
        },
      ];
      related.forEach(function (item) {
        evidence.push({
          type: "issue",
          label: item.id + ": " + item.title,
          url: githubIssueUrl(item),
        });
      });
      return evidence.slice(0, 3);
    }

    function mockHypothesisForIssue(issue) {
      const related = relatedCount(issue);
      const repro = issue.repro_steps ? "the captured repro steps" : "the original report";
      return "Start investigation in the code path described by " + repro +
        (related ? " and compare it with the linked related reports." : ".") +
        " The evidence below is the basis for this hypothesis.";
    }

    function renderHypothesisSummary(investigation) {
      if (!investigation || !investigation.hypothesis) return "";
      return (
        '<section class="detail-section">' +
          "<h2>Root-cause hypothesis</h2>" +
          '<div class="hypothesis-card"><p>' + escapeHtml(investigation.hypothesis) + "</p></div>" +
        "</section>"
      );
    }

    // D5 hero — the verifiable bit. A proposed fix is only ever present when the
    // crashing symbol was grounded in REAL repository source (fetch_source_evidence),
    // so the citation links to the actual cli/cli line and the diff is anchored to
    // the fetched lines. No source => no proposed_fix => this renders nothing.
    function renderProposedFix(investigation) {
      const fix = investigation && investigation.proposed_fix;
      if (!fix || !fix.diff) return "";
      const range = fix.line_start
        ? ":" + fix.line_start + (fix.line_end && fix.line_end !== fix.line_start ? "-" + fix.line_end : "")
        : "";
      const cite = escapeHtml((fix.file_path || "source") + range);
      const diffHtml = String(fix.diff).split("\n").map(function (line) {
        const cls = /^[-+]{3}/.test(line) || line.indexOf("@@") === 0 ? "meta"
          : line[0] === "+" ? "add"
          : line[0] === "-" ? "del" : "";
        return '<span class="dl ' + cls + '">' + escapeHtml(line.length ? line : " ") + "</span>";
      }).join("");
      return (
        '<section class="detail-section">' +
          '<h2>Proposed fix<span class="verified-pill">verified against real source</span></h2>' +
          '<div class="fix-card">' +
            '<div class="fix-head">' +
              '<a class="code-citation" href="' + escapeHtml(safeUrl(fix.url)) + '" target="_blank" rel="noreferrer">' +
                "🔗 " + cite +
                '<span class="cite-hint">open in cli/cli ↗</span>' +
              "</a>" +
              '<button type="button" class="copy-fix" id="copy-fix">Copy diff</button>' +
            "</div>" +
            '<pre class="diff">' + diffHtml + "</pre>" +
            (fix.rationale ? '<p class="fix-rationale">' + escapeHtml(fix.rationale) + "</p>" : "") +
          "</div>" +
        "</section>"
      );
    }

    function renderEvidenceCards(investigation) {
      const evidence = investigation && Array.isArray(investigation.evidence)
        ? investigation.evidence
        : [];
      if (!evidence.length) return "";
      return (
        '<section class="detail-section">' +
          "<h2>Evidence</h2>" +
          '<div class="evidence-grid">' +
            evidence.map(function (item) {
              return (
                '<a class="evidence-card" href="' + escapeHtml(safeUrl(item.url)) + '" target="_blank" rel="noreferrer">' +
                  '<span class="evidence-type">' + escapeHtml(item.type || "evidence") + "</span>" +
                  '<span class="evidence-label">' + escapeHtml(item.label || item.url || "Evidence link") + "</span>" +
                "</a>"
              );
            }).join("") +
          "</div>" +
        "</section>"
      );
    }

    // The AI's one-sentence priority rationale (issues.triage_reason). Shown
    // right under the priority badge so the judgment, not just the verdict, is
    // visible. Hidden when a row hasn't been triaged or carries no reason yet.
    function renderTriageReason(issue) {
      const reason = (issue.triage_reason || "").trim();
      if (!reason) return "";
      const key = issue.priority || "untriaged";
      return '<div class="triage-reason p-' + key + '">' +
        '<span class="triage-reason-label">AI triage</span>' +
        '<span class="triage-reason-text">' + escapeHtml(reason) + "</span>" +
      "</div>";
    }

    // ---- Audit / evidence timeline ----
    const TL_ACTOR_LABEL = { system: "System", ai: "AI", operator: "Operator" };
    const PRIORITY_LABEL = { critical: "Critical", high: "High", normal: "Normal", low: "Low" };

    function formatEventTime(ts) {
      const d = ts ? new Date(ts) : null;
      if (!d || isNaN(d.getTime())) return "";
      return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
    }

    // Synthesize a trail from the issue's own fields — used in mock/seed/sample and
    // as a fallback in live mode before/when the events Table has no rows for an
    // issue. Mirrors scripts/backfill_events.py so live + synthesized read alike.
    function synthTimeline(issue) {
      const base = issue.created_at ? new Date(issue.created_at) : new Date(Date.now() - 4 * 60000);
      const at = function (sec) { return new Date(base.getTime() + sec * 1000).toISOString(); };
      const label = SOURCE_LABELS[issue.source] || (issue.source || "Report");
      const acct = issue.source_account;
      const events = [];
      events.push({
        kind: "ingested", actor: "system", ts: at(0),
        summary: (issue.source === "github" && issue.external_id
          ? "GitHub issue #" + issue.external_id + " ingested"
          : label + " report ingested") + (acct ? " from " + acct : ""),
      });
      if (issue.priority) {
        events.push({
          kind: "triaged", actor: "ai", ts: at(60),
          summary: "AI triaged as " + (PRIORITY_LABEL[issue.priority] || issue.priority),
          detail: issue.triage_reason || "",
        });
      }
      const rel = Array.isArray(issue.related_ids) ? issue.related_ids.length : 0;
      if (rel) {
        events.push({
          kind: "linked", actor: "ai", ts: at(120),
          summary: "Linked " + rel + " related report" + (rel === 1 ? "" : "s"),
        });
      }
      const inv = AppState.investigations[issue.id];
      if (inv && inv.status === "complete" && inv.hypothesis) {
        events.push({
          kind: "investigated", actor: "ai", ts: at(180),
          summary: (inv.proposed_fix && inv.proposed_fix.diff)
            ? "Investigation found source evidence + proposed a fix"
            : "Investigation synthesized a root-cause hypothesis",
        });
      }
      return events;
    }

    function timelineFor(issue) {
      return AppState.events[issue.id] || synthTimeline(issue);
    }

    function eventDetailText(ev) {
      if (!ev.detail) return "";
      if (typeof ev.detail !== "string") return "";
      let parsed = null;
      try { parsed = JSON.parse(ev.detail); } catch (e) { return ev.detail; }
      if (parsed && (parsed.from !== undefined || parsed.to !== undefined)) {
        return (parsed.from == null ? "—" : parsed.from) + " → " + (parsed.to == null ? "—" : parsed.to);
      }
      if (parsed && parsed.reason) return parsed.reason;
      return "";
    }

    function renderTimeline(issue) {
      const events = timelineFor(issue).slice().sort(function (a, b) {
        return String(a.ts || a.created_at || "").localeCompare(String(b.ts || b.created_at || ""));
      });
      if (!events.length) return '<p class="detail-empty">No activity recorded yet.</p>';
      return (
        '<ul class="timeline">' +
        events.map(function (ev) {
          const actor = TL_ACTOR_LABEL[ev.actor] ? ev.actor : "system";
          const time = formatEventTime(ev.ts || ev.created_at);
          const detail = eventDetailText(ev);
          return (
            '<li class="tl-item actor-' + actor + '">' +
              '<span class="tl-dot"></span>' +
              '<div class="tl-head">' +
                (time ? '<span class="tl-time">' + escapeHtml(time) + "</span>" : "") +
                '<span class="tl-actor">' + escapeHtml(TL_ACTOR_LABEL[actor]) + "</span>" +
              "</div>" +
              '<div class="tl-summary">' + escapeHtml(ev.summary || "") + "</div>" +
              (detail ? '<div class="tl-detail">' + escapeHtml(detail) + "</div>" : "") +
            "</li>"
          );
        }).join("") +
        "</ul>"
      );
    }

    // Load the live trail (async); falls back to synthesis. Caches on AppState and
    // re-renders the detail if the issue is still open.
    async function loadTimeline(issue) {
      if (AppState.events[issue.id]) return;
      let events = null;
      try { events = await DataSource.listEvents(issue.id); } catch (e) { events = null; }
      AppState.events[issue.id] = (events && events.length) ? events : synthTimeline(issue);
      if (AppState.selectedId === issue.id) renderDetail(issue);
    }

    // Append an operator event so the timeline updates immediately (the backend
    // logged its own copy through the override Function).
    function appendOperatorEvent(issueId, kind, summary, detail) {
      const issue = findIssue(issueId);
      const list = AppState.events[issueId] || (issue ? synthTimeline(issue) : []);
      list.push({ kind: kind, actor: "operator", ts: new Date().toISOString(),
        summary: summary, detail: detail ? JSON.stringify(detail) : null });
      AppState.events[issueId] = list;
    }

    // ---- Human override controls — the three-dot menu (hidden until an issue is open) ----
    function renderOverrideMenu(issue) {
      if (!AppState.menuOpen) return "";
      const pr = issue.priority || "";
      const st = issue.status || "new";
      const prOpt = function (v) {
        return '<option value="' + v + '"' + (v === pr ? " selected" : "") + ">" + (PRIORITY_LABEL[v] || v) + "</option>";
      };
      const stOpt = function (v) {
        return '<option value="' + v + '"' + (v === st ? " selected" : "") + ">" + (STATUS_LABELS[v] || v) + "</option>";
      };
      return (
        '<div class="override-menu" role="menu" aria-label="Override controls">' +
          "<h3>Override</h3>" +
          '<div class="ov-row">' +
            '<span class="ov-label">Priority</span>' +
            '<select id="ov-priority" aria-label="Set priority">' +
              ["critical", "high", "normal", "low"].map(prOpt).join("") +
            "</select>" +
          "</div>" +
          '<div class="ov-row">' +
            '<span class="ov-label">Assignee</span>' +
            '<div class="ov-assign">' +
              '<input type="text" id="ov-assignee" placeholder="Unassigned" value="' + escapeHtml(issue.assignee || "") + '" aria-label="Set assignee" />' +
              '<button type="button" id="ov-assign-btn">Assign</button>' +
            "</div>" +
          "</div>" +
          '<div class="ov-row">' +
            '<span class="ov-label">Status</span>' +
            '<select id="ov-status" aria-label="Set status">' +
              ["new", "triaged", "investigating", "resolved"].map(stOpt).join("") +
            "</select>" +
          "</div>" +
        "</div>"
      );
    }

    // Each override: optimistic local update + immediate operator timeline event +
    // re-render, then the live write through the granted Function (revert on failure).
    async function overridePriority(issueId, priority) {
      const issue = findIssue(issueId);
      if (!issue || priority === (issue.priority || "")) return;
      const prev = issue.priority || null;
      issue.priority = priority; issue.updated_at = new Date().toISOString();
      appendOperatorEvent(issueId, "priority_changed",
        "Priority changed to " + (PRIORITY_LABEL[priority] || priority), { from: prev, to: priority });
      renderDetail(issue);
      const ok = await DataSource.setPriority(issueId, priority);
      if (!ok) { issue.priority = prev; AppState.events[issueId].pop(); renderDetail(issue); }
    }

    async function overrideAssignee(issueId, raw) {
      const issue = findIssue(issueId);
      if (!issue) return;
      const prev = issue.assignee || null;
      const next = (raw || "").trim() || null;
      AppState.menuOpen = false;
      if (next === prev) { renderDetail(issue); return; }
      issue.assignee = next; issue.updated_at = new Date().toISOString();
      appendOperatorEvent(issueId, "assignee_changed",
        next ? "Assigned to " + next : "Unassigned", { from: prev, to: next });
      renderDetail(issue);
      const ok = await DataSource.setAssignee(issueId, next || "");
      if (!ok) { issue.assignee = prev; AppState.events[issueId].pop(); renderDetail(issue); }
    }

    async function overrideStatus(issueId, status) {
      const issue = findIssue(issueId);
      if (!issue || status === (issue.status || "new")) return;
      const prev = issue.status || "new";
      issue.status = status; issue.updated_at = new Date().toISOString();
      appendOperatorEvent(issueId, "status_changed",
        "Status changed to " + (STATUS_LABELS[status] || status), { from: prev, to: status });
      renderDetail(issue);
      const ok = await DataSource.setStatus(issueId, status);
      if (!ok) { issue.status = prev; AppState.events[issueId].pop(); renderDetail(issue); }
    }

    // Dismiss-listeners for the open override menu. Stored at module scope and
    // cleared on every render so they never accumulate across re-renders.
    var _menuDismiss = null;
    function clearMenuDismiss() { if (_menuDismiss) { _menuDismiss(); _menuDismiss = null; } }
    function installMenuDismiss(issue) {
      const onDoc = function () {
        AppState.menuOpen = false;
        clearMenuDismiss();
        if (AppState.selectedId === issue.id) renderDetail(issue);
      };
      const onKey = function (e) { if (e.key === "Escape") onDoc(); };
      // Defer so the click that opened the menu doesn't immediately close it.
      setTimeout(function () {
        document.addEventListener("click", onDoc);
        document.addEventListener("keydown", onKey);
      }, 0);
      _menuDismiss = function () {
        document.removeEventListener("click", onDoc);
        document.removeEventListener("keydown", onKey);
      };
    }

    // CENTER pane — the selected issue summary: identity, AI triage, report,
    // reproduction, related reports, plus the override menu.
    function renderCenter(issue) {
      const key = issue.priority || "untriaged";
      const repro = issue.repro_steps
        ? '<p class="detail-text">' + escapeHtml(issue.repro_steps) + "</p>"
        : '<p class="detail-empty">No repro steps captured yet.</p>';
      return (
        '<div class="pane-head">' +
          '<button type="button" class="back-btn" id="back-to-queue">&larr; Queue</button>' +
